<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>PS Zone | Makeup · Clothes · Mobiles & more</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff5f7;
      color: #2d2a2b;
    }

    /* pink & white nykaa style */
    .top-bar {
      background: white;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: 0 4px 12px rgba(232,62,140,0.08);
      border-bottom: 1px solid #ffe2ec;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e83e8c, #ff85a1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .logo i {
      display: none; /* heart removed */
    }

    .search-category-row {
      background: white;
      padding: 18px 32px 12px 32px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid #ffe2ec;
    }

    .search-box {
      flex: 2;
      min-width: 220px;
      display: flex;
      align-items: center;
      background: #fff0f3;
      border-radius: 48px;
      padding: 6px 18px;
      border: 1px solid #ffc0d0;
    }
    .search-box i {
      color: #e83e8c;
    }
    .search-box input {
      border: none;
      background: transparent;
      padding: 12px 12px;
      font-size: 1rem;
      width: 100%;
      outline: none;
    }

    .category-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .filter-btn {
      background: #fff0f3;
      border: none;
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      color: #b13e6b;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #e83e8c;
      color: white;
      box-shadow: 0 6px 12px rgba(232,62,140,0.2);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 32px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 28px;
      margin-bottom: 50px;
    }

    .product-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      transition: 0.25s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
      border: 1px solid #ffe2ec;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px -8px rgba(232,62,140,0.2);
      border-color: #ffb7cb;
    }
    .product-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #fef6f9;
    }
    .card-info {
      padding: 16px 16px 20px;
    }
    .product-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 6px;
    }
    .price {
      font-weight: 800;
      font-size: 1.35rem;
      color: #e83e8c;
      margin: 8px 0;
    }
    .rating {
      color: #ffb347;
      font-size: 0.8rem;
    }
    .category-badge {
      font-size: 0.7rem;
      background: #ffeef4;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      margin-top: 8px;
      color: #b56576;
    }

    /* contact section */
    .contact-section {
      background: white;
      border-radius: 32px;
      margin-top: 20px;
      margin-bottom: 40px;
      padding: 36px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.03);
      border: 1px solid #ffe0ea;
    }
    .contact-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #b13e6b;
      margin-bottom: 8px;
    }
    .form-group {
      margin-bottom: 22px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 14px 20px;
      border-radius: 48px;
      border: 1.5px solid #ffcfdf;
      background: #fffbfd;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: #e83e8c;
      outline: none;
      box-shadow: 0 0 0 3px rgba(232,62,140,0.1);
    }
    .send-feedback-btn {
      background: #e83e8c;
      border: none;
      padding: 12px 32px;
      border-radius: 48px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
    .send-feedback-btn:hover {
      background: #c72a74;
    }

    /* DETAIL PAGE */
    .detail-view {
      background: white;
      border-radius: 32px;
      padding: 32px;
      margin-bottom: 40px;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      color: #e83e8c;
      cursor: pointer;
      margin-bottom: 24px;
      display: inline-flex;
      gap: 8px;
    }
    .detail-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 36px;
    }
    .detail-gallery {
      flex: 1.2;
      min-width: 260px;
    }
    .detail-main-img {
      width: 100%;
      border-radius: 28px;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: #fef2f6;
    }
    .extra-thumbs {
      display: flex;
      gap: 14px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .extra-thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 18px;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .extra-thumb:hover {
      border-color: #e83e8c;
    }
    .detail-info {
      flex: 1;
    }
    .detail-price {
      font-size: 2rem;
      font-weight: 800;
      color: #e83e8c;
      margin: 12px 0;
    }
    .reviews-section {
      margin-top: 32px;
      border-top: 2px solid #ffe2ec;
      padding-top: 24px;
    }
    .review-card {
      background: #fffafc;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 14px;
    }
    footer {
      text-align: center;
      padding: 20px;
      color: #b56576;
      border-top: 1px solid #ffe2ec;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 700px) {
      .top-bar, .search-category-row { padding: 12px 20px; }
      .container { padding: 20px 16px; }
    }
  </style>
</head>

</div>

  let currentCategory = 'all';
  let currentSearch = '';

  function renderHomepage() {
    let filtered = products.filter(p => {
      const matchCat = currentCategory === 'all' || p.category === currentCategory;
      const matchSearch = p.name.toLowerCase().includes(currentSearch.toLowerCase()) || p.category.includes(currentSearch.toLowerCase());
      return matchCat && matchSearch;
    });
    productsGrid.innerHTML = '';
    if(filtered.length === 0) {
      productsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">✨ No items found. Try another keyword ✨</div>`;
      return;
    }
    filtered.forEach(prod => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <img class="product-img" src="${prod.image}" alt="${prod.name}" loading="lazy" onerror="this.src='https://picsum.photos/id/29/400/400'">
        <div class="card-info">
          <div class="product-title">${prod.name}</div>
          <div class="price">$${prod.price.toFixed(2)}</div>
          <div class="rating"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i></div>
          <div class="category-badge">${prod.category === 'makeup' ? '💄 Makeup' : prod.category === 'clothes' ? '👗 Fashion' : prod.category === 'mobile' ? '📱 Mobile' : '👜 Accessories'}</div>
        </div>
      `;
      card.addEventListener('click', () => openProductDetail(prod.id));
      productsGrid.appendChild(card);
    });
  }

  function openProductDetail(productId) {
    const product = products.find(p => p.id === productId);
    if(!product) return;
    // fill detail
    document.getElementById('detailTitle').innerText = product.name;
    document.getElementById('detailPrice').innerHTML = `$${product.price.toFixed(2)}`;
    document.getElementById('detailDesc').innerText = product.desc;
    const mainImg = document.getElementById('detailMainImg');
    mainImg.src = product.image;
    // extra images
    const thumbsContainer = document.getElementById('detailExtraThumbs');
    thumbsContainer.innerHTML = '';
    const extras = product.extraImages || [];
    extras.forEach(url => {
      const thumb = document.createElement('img');
      thumb.src = url;
      thumb.classList.add('extra-thumb');
      thumb.addEventListener('click', () => { mainImg.src = url; });
      thumbsContainer.appendChild(thumb);
    });
    if(extras.length === 0) thumbsContainer.innerHTML = '<p style="font-size:0.8rem;">✨ More photos in store</p>';
    // reviews
    const reviews = getReviews(product.id);
    const reviewsContainer = document.getElementById('reviewsContainer');
    reviewsContainer.innerHTML = '';
    reviews.forEach(r => {
      const revDiv = document.createElement('div');
      revDiv.className = 'review-card';
      revDiv.innerHTML = `<div class="reviewer"><i class="fas fa-user-circle"></i> ${r.user}</div><div class="review-text">⭐ ${r.text}</div>`;
      reviewsContainer.appendChild(revDiv);
    });
    homepageView.classList.add('hidden');
    detailViewDiv.classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function backToHome() {
    homepageView.classList.remove('hidden');
    detailViewDiv.classList.add('hidden');
    renderHomepage();
  }

  // filter & search
  searchInput.addEventListener('input', (e) => { currentSearch = e.target.value; renderHomepage(); });
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = btn.getAttribute('data-cat');
      renderHomepage();
    });
  });

  // Contact form (send feedback to sammanlamsal31@gmail.com)
  const feedbackForm = document.getElementById('feedbackForm');
  const feedbackStatus = document.getElementById('feedbackStatus');
  feedbackForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const firstName = document.getElementById('firstNameContact').value.trim();
    const message = document.getElementById('feedbackMsg').value.trim();
    if(!firstName || !message) {
      feedbackStatus.innerHTML = '<span style="color:#d9534f;">💬 Please fill both fields.</span>';
      return;
    }
    feedbackStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Sending feedback...';
    try {
      const res = await fetch('https://formsubmit.co/ajax/sammanlamsal31@gmail.com', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: firstName,
          message: message,
          _subject: `📝 PS Zone Feedback from ${firstName}`,
          _captcha: 'false'
        })
      });
      if(res.ok) {
        feedbackStatus.innerHTML = '<span style="color:#2b7a3e;">✅ Thank you! Your feedback has been sent 💖</span>';
        feedbackForm.reset();
        setTimeout(() => feedbackStatus.innerHTML = '', 5000);
      } else throw new Error();
    } catch(err) {
      feedbackStatus.innerHTML = '<span style="color:#c0392b;">❌ Failed to send. Please try again later.</span>';
    }
  });

  document.getElementById('backToHomeBtn').addEventListener('click', backToHome);
  renderHomepage();
</script>
</body>
</html>
