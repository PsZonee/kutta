<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Book Just For You 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Dancing+Script:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #f9c8d9;
    --rose: #e8799e;
    --deep-rose: #c0446b;
    --petal: #fde8f0;
    --cream: #fff8fa;
    --gold: #d4a873;
    --gold-bright: #f5c842;
    --text: #5a2a3a;
    --soft: #f0b8cb;
    --white: #ffffff;
    --shadow: rgba(192, 75, 107, 0.18);
    --pink-cover: #e0607a;
    --pink-cover-dark: #c84060;
    --pink-cover-light: #f07a95;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: linear-gradient(135deg, #ffe0ec 0%, #fcd1e2 30%, #fbbdcf 60%, #f9a8c0 100%);
    min-height: 100vh;
    font-family: 'Lora', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .hearts-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; overflow: hidden; z-index: 0;
  }
  .heart-float {
    position: absolute; font-size: 1.2rem; opacity: 0.15;
    animation: floatUp linear infinite; bottom: -30px;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.15; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  .sparkle {
    position: fixed; pointer-events: none; font-size: 1rem;
    z-index: 9999; animation: sparkleAnim 0.8s forwards;
  }
  @keyframes sparkleAnim {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg) translateY(-30px); opacity: 0; }
  }

  #cover-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #ffe0ec 0%, #fcd1e2 40%, #f9a8c0 100%);
  }
  #cover-screen::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 80%, rgba(210,160,100,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,220,180,0.1) 0%, transparent 40%);
    pointer-events: none;
  }

  .fairy-lights {
    position: absolute; top: 0; left: 0; right: 0; height: 60px;
    display: flex; justify-content: center; align-items: flex-end;
    gap: 18px; padding-bottom: 8px; z-index: 2;
  }
  .bulb {
    width: 8px; height: 10px; border-radius: 50% 50% 40% 40%;
    position: relative; animation: glowBulb 2s ease-in-out infinite;
  }
  .bulb:nth-child(odd) { animation-delay: 0.3s; }
  .bulb:nth-child(3n) { animation-delay: 0.7s; }
  .bulb-warm { background: #ffe066; box-shadow: 0 0 8px 3px rgba(255,220,80,0.7); }
  .bulb-pink { background: #ff99bb; box-shadow: 0 0 8px 3px rgba(255,120,160,0.6); }
  .bulb-white { background: #fff5dd; box-shadow: 0 0 8px 3px rgba(255,240,200,0.8); }
  @keyframes glowBulb { 0%,100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
  .fairy-lights::before {
    content: ''; position: absolute; top: 12px; left: 5%; right: 5%;
    height: 1.5px; background: rgba(120,80,60,0.35); z-index: -1;
  }

  .side-deco {
    position: absolute; font-size: 1.4rem; opacity: 0.6;
    animation: gentleFloat 4s ease-in-out infinite;
  }
  @keyframes gentleFloat { 0%,100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(5deg); } }

  .cover-book-wrap { perspective: 1400px; cursor: pointer; user-select: none; position: relative; z-index: 3; }
  .cover-book {
    width: min(230px, 68vw); height: min(310px, 50vh); position: relative;
    transform-style: preserve-3d; transform: rotateX(12deg) rotateY(-18deg) rotateZ(-3deg);
    transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
    filter: drop-shadow(8px 20px 30px rgba(120,40,60,0.45));
  }
  .cover-book-wrap:hover .cover-book { transform: rotateX(8deg) rotateY(-8deg) rotateZ(-1deg) scale(1.04); }

  .book-face {
    position: absolute; inset: 0; border-radius: 4px 14px 14px 4px;
    background: linear-gradient(160deg, var(--pink-cover-light) 0%, var(--pink-cover) 40%, var(--pink-cover-dark) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 16px 14px; overflow: hidden;
  }
  .book-face::before {
    content: ''; position: absolute; inset: 8px; border: 2.5px solid var(--gold-bright);
    border-radius: 2px 10px 10px 2px; opacity: 0.7; pointer-events: none;
  }

  .cover-stars { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .cover-star { position: absolute; color: var(--gold-bright); font-size: 0.9rem; opacity: 0.8; animation: twinkle 2s ease-in-out infinite; }
  @keyframes twinkle { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

  .cover-title-area { text-align: center; z-index: 1; position: relative; }
  .cover-title {
    font-family: 'Dancing Script', cursive; font-size: clamp(1.3rem, 5vw, 1.8rem);
    color: var(--gold-bright); text-shadow: 1px 2px 0 rgba(120,60,0,0.4), 0 0 12px rgba(255,220,80,0.4);
    line-height: 1.2; font-weight: 700; letter-spacing: 0.5px;
  }

  .cover-illustration {
    width: 90%; flex: 1; margin: 8px 0; border-radius: 6px;
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1660 40%, #1a2a50 100%);
    border: 2px solid var(--gold); position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; z-index: 1;
  }
  .cover-illustration::before {
    content: '✦ ✧ ✦ ✧ ✦'; position: absolute; top: 6px; left: 0; right: 0;
    text-align: center; font-size: 0.5rem; color: rgba(255,255,255,0.6); letter-spacing: 4px;
  }
  .illus-moon { position: absolute; top: 12px; right: 18px; font-size: 1rem; filter: brightness(1.3); }
  .illus-trees { position: absolute; bottom: 0; left: 0; right: 0; height: 55%; display: flex; align-items: flex-end; justify-content: space-around; padding: 0 4px; }
  .illus-tree { background: rgba(20,40,20,0.8); border-radius: 50% 50% 0 0; position: relative; }
  .illus-path { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 30%; height: 40%; background: radial-gradient(ellipse at center bottom, rgba(100,220,100,0.3) 0%, transparent 70%); border-radius: 50%; }
  .illus-girl { font-size: 1.1rem; position: relative; z-index: 2; }
  .illus-mushroom { position: absolute; font-size: 0.7rem; }
  .illus-house { position: absolute; top: 18px; right: 8px; font-size: 0.9rem; opacity: 0.8; }
  .illus-ground { position: absolute; bottom: 0; left: 0; right: 0; height: 25%; background: linear-gradient(to top, rgba(30,80,20,0.5) 0%, transparent 100%); }

  .cover-sub-title { font-family: 'Dancing Script', cursive; font-size: clamp(0.7rem, 2.5vw, 0.85rem); color: rgba(255,255,255,0.85); text-align: center; z-index: 1; line-height: 1.4; }

  .book-spine-3d { position: absolute; top: 0; left: -22px; width: 22px; height: 100%; transform-origin: right center; background: linear-gradient(to right, #8a1f40, #a83060); border-radius: 4px 0 0 4px; transform: rotateY(90deg); box-shadow: inset -4px 0 8px rgba(0,0,0,0.3); }
  .book-bottom-3d { position: absolute; bottom: -10px; left: 0; right: 0; height: 10px; background: linear-gradient(to bottom, #c0446b, #9b2d4f); transform-origin: top center; transform: rotateX(-90deg); border-radius: 0 0 4px 4px; }

  .corner-star { position: absolute; font-size: 0.9rem; color: var(--gold-bright); }
  .corner-star.tl { top: 14px; left: 14px; }
  .corner-star.tr { top: 14px; right: 14px; }
  .corner-star.bl { bottom: 14px; left: 14px; }
  .corner-star.br { bottom: 14px; right: 14px; }

  .tap-hint { margin-top: 32px; display: flex; flex-direction: column; align-items: center; gap: 6px; animation: pulse 2s ease-in-out infinite; z-index: 3; position: relative; }
  @keyframes pulse { 0%,100% { opacity: 0.7; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-5px); } }
  .tap-hint span { font-family: 'Dancing Script', cursive; font-size: 1.2rem; color: var(--deep-rose); text-shadow: 0 1px 4px rgba(255,255,255,0.6); }

  .cover-opening .cover-book { animation: bookOpenCover 1.2s cubic-bezier(.77,0,.18,1) forwards; }
  @keyframes bookOpenCover { 0% { transform: rotateX(12deg) rotateY(-18deg) rotateZ(-3deg); } 40% { transform: rotateX(5deg) rotateY(-40deg) rotateZ(-2deg) scale(1.05); } 100% { transform: rotateX(0deg) rotateY(-100deg) rotateZ(0deg) scale(0.8) translateX(-40px); opacity: 0; } }
  .cover-opening { animation: coverFade 1.3s forwards; }
  @keyframes coverFade { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }

  #reader { position: fixed; inset: 0; z-index: 50; display: none; flex-direction: column; align-items: center; background: linear-gradient(160deg, #ffe0ec 0%, #fcd1e2 40%, #fbbdcf 100%); }
  #reader.visible { display: flex; }

  .top-bar { width: 100%; padding: 10px 14px 8px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(232,121,158,0.2); flex-shrink: 0; }
  .top-title { font-family: 'Dancing Script', cursive; font-size: 1.3rem; color: var(--deep-rose); }
  .page-jump-form { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.7); border: 1.5px solid var(--rose); border-radius: 20px; padding: 3px 10px; }
  .page-jump-form input { width: 52px; border: none; background: transparent; font-family: 'Lora', serif; font-size: 0.85rem; color: var(--text); outline: none; text-align: center; }
  .page-jump-form button { background: var(--rose); border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; }
  .page-counter { font-family: 'Dancing Script', cursive; font-size: 1rem; color: var(--deep-rose); min-width: 60px; text-align: right; }

  .book-stage { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; perspective: 1500px; overflow: hidden; position: relative; }

  .book { width: min(340px, 95vw); height: min(560px, calc(100vh - 120px)); position: relative; transform-style: preserve-3d; }
  .book::after { content: ''; position: absolute; bottom: -16px; left: 5%; right: 5%; height: 18px; background: radial-gradient(ellipse, rgba(192,68,107,0.25) 0%, transparent 70%); border-radius: 50%; }

  .page-container { position: absolute; inset: 0; transform-style: preserve-3d; }
  .page { position: absolute; width: 100%; height: 100%; border-radius: 4px 16px 16px 4px; background: var(--cream); backface-visibility: hidden; overflow: hidden; box-shadow: 3px 0 12px rgba(192,68,107,0.12), 2px 4px 20px rgba(192,68,107,0.15), inset -2px 0 8px rgba(0,0,0,0.04); }
  .page::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent, transparent 28px, rgba(232,121,158,0.06) 28px, rgba(232,121,158,0.06) 29px); pointer-events: none; }

  .page-inner { width: 100%; height: 100%; overflow-y: auto; padding: 28px 22px 80px; scrollbar-width: thin; scrollbar-color: var(--soft) transparent; position: relative; z-index: 1; }
  .page-inner::-webkit-scrollbar { width: 3px; }
  .page-inner::-webkit-scrollbar-track { background: transparent; }
  .page-inner::-webkit-scrollbar-thumb { background: var(--soft); border-radius: 3px; }

  .flip-wrapper { position: absolute; inset: 0; transform-origin: left center; transform-style: preserve-3d; }

  @keyframes cuteFlipForward {
    0% { transform: perspective(1200px) rotateY(0deg); box-shadow: 3px 0 12px rgba(192,68,107,0.12); }
    15% { transform: perspective(1200px) rotateY(-15deg); box-shadow: 15px 0 30px rgba(192,68,107,0.25); }
    50% { transform: perspective(1200px) rotateY(-90deg); box-shadow: -20px 0 40px rgba(192,68,107,0.35); }
    85% { transform: perspective(1200px) rotateY(-165deg); box-shadow: -10px 0 20px rgba(192,68,107,0.15); }
    100% { transform: perspective(1200px) rotateY(-180deg); box-shadow: none; }
  }
  @keyframes cuteFlipBack {
    0% { transform: perspective(1200px) rotateY(0deg); }
    50% { transform: perspective(1200px) rotateY(90deg); box-shadow: 20px 0 40px rgba(192,68,107,0.35); }
    100% { transform: perspective(1200px) rotateY(180deg); }
  }

  .book.flipping-forward .page-container { animation: cuteFlipForward 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards; transform-origin: left center; }
  .book.flipping-back .page-container { animation: cuteFlipBack 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards; transform-origin: left center; }

  .page::after { content: ''; position: absolute; bottom: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 0 22px 22px; border-color: transparent transparent rgba(232,121,158,0.25) transparent; transition: border-width 0.2s; }
  .page:hover::after { border-width: 0 0 30px 30px; }

  .page-sparkle { position: absolute; pointer-events: none; font-size: 0.8rem; z-index: 100; animation: pageSparkleAnim 0.6s forwards; }
  @keyframes pageSparkleAnim { 0% { transform: scale(0) translateY(0); opacity: 1; } 100% { transform: scale(1.2) translateY(-20px); opacity: 0; } }

  .page-deco-top { position: absolute; top: 10px; left: 0; right: 0; text-align: center; font-size: 0.8rem; color: var(--rose); opacity: 0.4; letter-spacing: 4px; }
  .page-deco-bottom { position: absolute; bottom: 14px; left: 0; right: 0; text-align: center; font-size: 0.75rem; color: var(--rose); opacity: 0.35; }
  .page-num-display { position: absolute; bottom: 14px; font-family: 'Dancing Script', cursive; font-size: 0.9rem; color: var(--rose); opacity: 0.55; }
  .page-num-display.left { left: 18px; }
  .page-num-display.right { right: 18px; }

  .page-heading { font-family: 'Dancing Script', cursive; font-size: clamp(1.4rem, 5vw, 1.8rem); color: var(--deep-rose); text-align: center; margin-bottom: 18px; line-height: 1.3; font-weight: 700; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }
  .page-text { font-family: 'Lora', serif; font-size: clamp(0.85rem, 3.2vw, 0.98rem); color: var(--text); line-height: 1.9; text-align: justify; margin-bottom: 16px; }
  .page-text.italic { font-style: italic; }
  
  .flirty-callout { font-family: 'Lora', serif; font-size: 0.95rem; color: var(--deep-rose); font-weight: 600; text-align: center; margin: 18px 0; padding: 10px; border-top: 1px dashed var(--rose); border-bottom: 1px dashed var(--rose); }
  
  .poem-block { background: linear-gradient(135deg, rgba(249,200,217,0.35), rgba(232,121,158,0.15)); border-left: 3px solid var(--rose); border-radius: 0 12px 12px 0; padding: 18px 20px; margin: 20px 0; box-shadow: 2px 4px 10px rgba(192,68,107,0.05); }
  .poem-block p { font-family: 'Lora', serif; font-style: italic; font-size: clamp(0.85rem, 3vw, 0.95rem); color: var(--deep-rose); line-height: 2.2; margin: 0; text-align: center; }
  
  .divider { text-align: center; margin: 20px 0; color: var(--rose); font-size: 1.2rem; opacity: 0.6; letter-spacing: 6px; }
  .body-feature-heading { font-family: 'Dancing Script', cursive; font-size: clamp(1.4rem, 4.5vw, 1.7rem); color: var(--deep-rose); text-align: center; margin: 14px 0 12px; font-weight: 700; }
  .body-feature-icon { text-align: center; font-size: 2rem; margin: 10px 0; animation: gentleFloat 3s ease-in-out infinite; }
  .memory-block { color: var(--deep-rose); font-style: italic; border-left: 2px solid var(--rose); padding-left: 12px; margin-bottom: 18px; font-size: 0.9rem; background: rgba(255,255,255,0.4); padding: 10px 12px; border-radius: 0 8px 8px 0; }

  .nav-bar { width: 100%; padding: 10px 20px; display: flex; align-items: center; justify-content: center; gap: 20px; background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); border-top: 1px solid rgba(232,121,158,0.2); flex-shrink: 0; }
  .nav-btn { background: linear-gradient(135deg, var(--rose), var(--deep-rose)); border: none; color: white; border-radius: 50px; padding: 10px 28px; font-family: 'Dancing Script', cursive; font-size: 1.05rem; cursor: pointer; box-shadow: 0 4px 15px rgba(192,68,107,0.3); transition: all 0.2s; display: flex; align-items: center; gap: 6px; user-select: none; }
  .nav-btn:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(192,68,107,0.2); }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }

  .progress-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: linear-gradient(to right, #ff99bb, var(--deep-rose)); transition: width 0.4s ease; border-radius: 0 2px 2px 0; }

  .swipe-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border-radius: 20px; padding: 6px 16px; font-family: 'Dancing Script', cursive; color: var(--deep-rose); font-size: 0.95rem; animation: fadeInOut 3s 2s forwards; pointer-events: none; white-space: nowrap; box-shadow: 0 2px 10px rgba(192,68,107,0.15); }
  @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(10px); } 20% { opacity: 1; transform: translateX(-50%) translateY(0); } 70% { opacity: 1; } 100% { opacity: 0; } }

  .confetti-piece { position: fixed; font-size: 1.2rem; z-index: 200; pointer-events: none; animation: confettiFall 2.5s forwards ease-in; }
  @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

  .ribbon { position: absolute; top: 0; right: 24px; width: 18px; background: linear-gradient(to bottom, #e8799e, #c0446b); border-radius: 0 0 4px 4px; z-index: 5; box-shadow: 2px 2px 6px rgba(192,68,107,0.3); transition: height 0.5s ease; }
  .ribbon::after { content: ''; display: block; width: 0; height: 0; border-left: 9px solid transparent; border-right: 9px solid transparent; border-top: 10px solid #c0446b; position: absolute; bottom: -10px; left: 0; }

  .page.body-section { background: linear-gradient(160deg, #fff0f6 0%, #ffe8f0 100%); }
  .first-page-decor { text-align: center; font-size: 2.2rem; margin: 12px 0; animation: heartbeat 2s ease-in-out infinite; }
  @keyframes heartbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  @media (max-width: 380px) { .book { width: 95vw; } }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div id="cover-screen">
  <div class="fairy-lights" id="fairyLights"></div>

  <div class="side-deco" style="top:20%;left:5%;animation-delay:0s;">🌸</div>
  <div class="side-deco" style="top:30%;left:8%;animation-delay:1s;">🌿</div>
  <div class="side-deco" style="top:65%;left:4%;animation-delay:0.5s;">💐</div>
  <div class="side-deco" style="top:75%;left:10%;animation-delay:1.5s;">🌼</div>
  <div class="side-deco" style="top:20%;right:5%;animation-delay:0.3s;">🌷</div>
  <div class="side-deco" style="top:35%;right:8%;animation-delay:0.8s;">🌿</div>
  <div class="side-deco" style="top:60%;right:4%;animation-delay:1.2s;">🌸</div>
  <div class="side-deco" style="top:78%;right:9%;animation-delay:0.1s;">🌼</div>

  <div class="cover-book-wrap" id="coverWrap" onclick="openBook()">
    <div class="cover-book" id="coverBook">
      <div class="book-spine-3d"></div>
      <div class="book-bottom-3d"></div>
      <div class="book-face">
        <div class="cover-stars">
          <span class="cover-star" style="top:10%;left:10%;animation-delay:0s;">★</span>
          <span class="cover-star" style="top:8%;right:12%;animation-delay:0.4s;">✦</span>
          <span class="cover-star" style="top:18%;left:20%;animation-delay:0.8s;">✧</span>
          <span class="cover-star" style="bottom:22%;left:8%;animation-delay:0.3s;">★</span>
          <span class="cover-star" style="bottom:20%;right:10%;animation-delay:0.6s;">✦</span>
          <span class="cover-star" style="top:50%;left:6%;animation-delay:1s;">✧</span>
          <span class="cover-star" style="top:50%;right:6%;animation-delay:0.2s;">★</span>
        </div>
        <span class="corner-star tl">★</span>
        <span class="corner-star tr">★</span>
        <span class="corner-star bl">★</span>
        <span class="corner-star br">★</span>

        <div class="cover-title-area">
          <div class="cover-title">A Book<br>Written Only<br>For You</div>
        </div>

        <div class="cover-illustration">
          <span class="illus-moon">🌙</span>
          <span class="illus-house">🏠</span>
          <div class="illus-ground"></div>
          <div class="illus-trees">
            <div class="illus-tree" style="width:28px;height:55px;"></div>
            <div class="illus-tree" style="width:22px;height:45px;margin-bottom:3px;"></div>
            <div class="illus-tree" style="width:30px;height:60px;"></div>
          </div>
          <div class="illus-path"></div>
          <span class="illus-mushroom" style="bottom:12px;left:14px;">🍄</span>
          <span class="illus-mushroom" style="bottom:8px;right:12px;">🍄</span>
          <span class="illus-girl">🧒🦊✨</span>
        </div>

        <div class="cover-sub-title">700 unique pages,<br>just for you 💕</div>
      </div>
    </div>
  </div>

  <div class="tap-hint">
    <span>💗 Tap the book to open 💗</span>
  </div>
</div>

<div id="reader">
  <div class="top-bar">
    <div class="top-title">💕 For You</div>
    <div class="page-jump-form">
      <input type="number" id="jumpInput" min="1" max="700" placeholder="pg #">
      <button onclick="jumpToPage()">→</button>
    </div>
    <div class="page-counter" id="pageCounter">1 / 700</div>
  </div>

  <div class="book-stage">
    <div class="book" id="book">
      <div class="page-container" id="pageContainer">
        <div class="page" id="currentPage">
          <div class="ribbon" id="ribbon" style="height:60px;"></div>
          <div class="page-deco-top" id="pageDecoTop">✦ ✦ ✦</div>
          <div class="page-inner" id="pageInner"></div>
          <div class="page-deco-bottom" id="pageDecoBottom">💕</div>
          <div class="page-num-display left" id="pageNumLeft"></div>
          <div class="page-num-display right" id="pageNumRight"></div>
          <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>
      </div>
    </div>
    <div class="swipe-hint">← swipe to turn pages →</div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn" onclick="prevPage()">← prev</button>
    <button class="nav-btn" id="nextBtn" onclick="nextPage()">next →</button>
  </div>
</div>

<script>
const TOTAL_PAGES = 700;
const BODY_SECTION_START = 601;

// ============================================================
// EXPANDED PROCEDURAL GENERATION ENGINE
// ============================================================

// The Setup: What are you doing?
const actions = [
  "bite your lip when you're thinking", "tuck your hair behind your ear", "give me that specific, knowing look", 
  "laugh at my terrible jokes", "lean into my touch", "steal a glance at me when you think I'm not looking", 
  "say my name in that soft, quiet tone", "just exist in the same room as me", "smile that incredibly distracting smile",
  "breathe softly while you're resting", "tilt your head and look up at me", "get all passionate about something you love",
  "playfully roll your eyes at me", "hold my gaze just a second longer than normal", "casually touch my arm"
];

// The Emotion: How does it feel?
const emotions = [
  "intoxicating", "maddeningly cute", "breath-taking", "deeply comforting", "wildly magnetic", 
  "undeniably perfect", "soul-soothing", "completely overwhelming in the best way", "heart-stopping",
  "insanely attractive", "warm and endlessly safe", "purely magical", "dangerously distracting", "effortlessly beautiful"
];

// The Impact: What does it do to me?
const effects = [
  "I forget how to form coherent sentences", "I just want to pull you close and never let go", 
  "my heart does this ridiculous, erratic little flip", "I realize I am completely ruined for anyone else",
  "the rest of the world just fades out to static", "I catch myself grinning like an absolute idiot",
  "my chest gets tight with how much I adore you", "I lose my train of thought completely",
  "I feel an overwhelming urge to just kiss you", "I am reminded exactly why I fell for you in the first place"
];

// The Metaphor: What is it like?
const metaphors = [
  "like gravity pulling me directly to you", "like an addictive melody I can't get out of my head", 
  "like coming home to a warm fire after a freezing day", "like the rush of a first kiss all over again",
  "like finding the one piece of the puzzle I didn't know was missing", "like sunlight suddenly breaking through dark clouds",
  "like a quiet secret only the two of us know", "like a sudden drop on a roller coaster, but in my heart"
];

// The Flirty Confession: Direct addressing
const flirtyThoughts = [
  "Honestly, it's completely unfair how gorgeous you are.",
  "I spend an embarrassing amount of time thinking about your lips.",
  "You have this ridiculous power over me, and the crazy part is, I absolutely love it.",
  "If you keep looking at me like that, I won't be held responsible for how many times I kiss you.",
  "Just a warning: I am hopelessly, irreversibly obsessed with you.",
  "I don't think you realize how desperately I want to pull you into my arms right now.",
  "You are entirely too tempting for my own good.",
  "Every time you get close, it takes all my willpower to behave myself.",
  "I could stare at you for hours and still feel like I haven't had enough."
];

// The Lingering Thought: Romantic conclusion
const deepThoughts = [
  "I never knew a single person could take up so much space in my mind, but I wouldn't have it any other way.",
  "You are the best part of my every day. Not just the good days, but all of them.",
  "I look at you and I see everything I could ever want in this life.",
  "Loving you isn't just something I do; it's become a fundamental part of who I am.",
  "I am so entirely yours, in ways I don't even know how to explain.",
  "I hope you can feel how much I love you, even in the quiet moments between us."
];

// === 4-LINE POEM GENERATION ARRAYS ===
const poemLine1 = [
  "A single glance, a heavy breath,", "The way the light falls on your skin,", "A whispered word, a gentle touch,", "When quiet moments pull me in,", "A shifting gaze, a sudden spark,", "Your silhouette against the light,"
];
const poemLine2 = [
  "The rhythm of my racing chest,", "A sweet surrender I begin,", "My defenses slowly crumbling down,", "I lose exactly where I end,", "A fire ignites inside the dark,", "My favorite kind of sleepless night,"
];
const poemLine3 = [
  "You draw me near without a sound,", "I lean into the warmth you bring,", "My eyes are locked, I cannot move,", "A perfect, sweet captivity,", "You smile and steal my breath away,", "I crave the taste of your embrace,"
];
const poemLine4 = [
  "And in your gravity, I am bound.", "You are my absolute everything.", "I'm captivated by your groove.", "And I am exactly where I need to be.", "And I would have it no other way.", "And nothing else could take your place."
];

// Seeded pseudo-random generator
function rand(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}
function pick(arr, seed) {
  return arr[Math.floor(rand(seed) * arr.length)];
}

// Generates the unique 4-line poem for a given page
function generatePoem(pageNum) {
  let l1 = pick(poemLine1, pageNum * 12.1);
  let l2 = pick(poemLine2, pageNum * 15.3);
  let l3 = pick(poemLine3, pageNum * 18.7);
  let l4 = pick(poemLine4, pageNum * 21.4);
  return `
    <div class="poem-block">
      <p>${l1}<br>${l2}<br>${l3}<br>${l4}</p>
    </div>
  `;
}

function generatePageContent(pageNum) {
  // Page 1: Dedication
  if (pageNum === 1) {
    return `
      <div class="page-heading">💕 To My Beautiful Love</div>
      <div class="first-page-decor">💖</div>
      <div class="page-text italic">This book contains exactly 700 pages. Every single one of them is uniquely generated, crafted just for you. No two pages are alike, because my love for you constantly reinvents itself.</div>
      <div class="page-text">You deserve to feel cherished. You deserve to feel overwhelmingly desired, admired, and entirely loved. I wanted to make something that could remind you of that, anytime you need it.</div>
      <div class="page-text">Take your time with these pages. Read them when you wake up, when you're bored, or when you just need to know that someone out there is completely crazy about you.</div>
      <div class="poem-block"><p>A million words could not contain<br>The rush I feel when you are near.<br>So turn the page and let me show<br>Exactly why I hold you dear.</p></div>
      <div class="page-text italic" style="text-align:center;font-family:'Dancing Script',cursive;font-size:1.4rem;color:var(--deep-rose);margin-top:20px;">With all my love, forever. 💕</div>
    `;
  }

  // --- MEMORY SYSTEM ---
  let memoryBlock = "";
  if (pageNum > 25 && pageNum % 7 === 0) {
    let memoryPage = Math.floor(rand(pageNum * 17) * (pageNum - 15)) + 5;
    let oldAction = pick(actions, memoryPage + 1);
    memoryBlock = `
      <div class="memory-block">
        I was just thinking back to page ${memoryPage}... about when you ${oldAction}. Honestly? It still gives me butterflies just thinking about it.
      </div>
    `;
  }

  let uniquePoem = generatePoem(pageNum);

  // --- BODY APPRECIATION SECTION (Pages 601 - 700) ---
  if (pageNum >= BODY_SECTION_START) {
    const bodyFeatures = [
      { name: "Eyes", icon: "👁️✨", qualities: ["hypnotic depth", "warm, inviting light", "dangerous spark", "gorgeous shape", "intense, beautiful gaze"] },
      { name: "Lips", icon: "💋", qualities: ["perfect softness", "maddening curve", "sweetest taste", "undeniable temptation", "beautiful pout"] },
      { name: "Smile", icon: "🌸", qualities: ["radiant, breathless joy", "cheeky, knowing smirk", "sweetest brightness", "heart-melting curve", "contagious, gorgeous light"] },
      { name: "Voice", icon: "🎶", qualities: ["sensual, calming tone", "sweet, addictive melody", "soft, breathless whisper", "gorgeous rhythm", "comforting, sexy rasp"] },
      { name: "Hands", icon: "🤍", qualities: ["gentle, electric touch", "soft caress", "perfect, comforting grip", "graceful movement", "maddeningly sweet hold"] },
      { name: "Mind", icon: "🧠✨", qualities: ["brilliant, sexy intellect", "beautifully chaotic thoughts", "sharp, witty humor", "deep, fascinating perspective", "gorgeous imagination"] },
      { name: "Laugh", icon: "😄", qualities: ["pure, uninhibited joy", "musical, addictive chime", "gorgeous, throaty sound", "heartwarming melody", "the best sound on earth"] },
      { name: "Collarbone & Neck", icon: "✨", qualities: ["delicate, gorgeous line", "maddeningly kissable skin", "soft, beautiful curve", "elegant, breathless grace", "perfectly sculpted shape"] },
      { name: "Hair", icon: "🎀", qualities: ["soft, beautiful mess", "gorgeous, silky flow", "intoxicating scent", "perfectly touchable texture", "stunningly effortless look"] }
    ];

    let feature = pick(bodyFeatures, pageNum * 2.5);
    let q1 = pick(feature.qualities, pageNum * 3.1);
    let q2 = pick(feature.qualities, pageNum * 4.2);
    if (q1 === q2) q2 = pick(feature.qualities, pageNum * 5.3 + 1);
    
    let flirtyBodyThought = pick([
      "It takes a ridiculous amount of self-control for me not to just kiss you every time I notice it.",
      "I am completely, entirely obsessed with it. And with you.",
      "It does things to my heart that I can't even begin to explain.",
      "Just thinking about it makes me want to pull you close right now.",
      "It is absolutely unfair to the rest of the world that you get to look this good."
    ], pageNum * 7.7);

    return `
      <div class="body-feature-heading">Your Gorgeous ${feature.name}</div>
      <div class="body-feature-icon">${feature.icon}</div>
      ${memoryBlock}
      <div class="page-text">As we get closer to the end of this book, I need to take a moment to be completely honest about your ${feature.name.toLowerCase()}.</div>
      <div class="page-text">There is this ${q1} to it that completely wrecks me. Every single time I catch a glimpse of its ${q2}, the rest of the room could catch fire and I wouldn't even notice.</div>
      <div class="flirty-callout">" ${flirtyBodyThought} "</div>
      <div class="page-text">You probably don't even think twice about it, but to me, it's a masterpiece. It's just one of the million physical and emotional reasons why I am so deeply, helplessly drawn to you.</div>
      ${uniquePoem}
      <div class="divider">✦ ✦ ✦</div>
      <div class="page-text" style="text-align:center; font-size: 0.85rem; font-style: italic;">Page ${pageNum} — completely mesmerized by you.</div>
    `;
  }

  // --- STANDARD PROCEDURAL PAGES (Pages 2 - 600) ---
  
  const action = pick(actions, pageNum + 1);
  const emotion = pick(emotions, pageNum + 2);
  const effect = pick(effects, pageNum + 3);
  const metaphor = pick(metaphors, pageNum + 4);
  const flirty = pick(flirtyThoughts, pageNum + 5);
  const deep = pick(deepThoughts, pageNum + 6);

  // Paragraph patterns to keep the reading experience fresh
  const patternSeed = Math.floor(rand(pageNum * 8.2) * 3);
  let p1, p2, p3;

  if (patternSeed === 0) {
    p1 = `I was replaying a moment in my head earlier—just the simple way you ${action}. It sounds so minor, but it is actually so ${emotion} to me.`;
    p2 = `It happens in a split second, but every time you do it, ${effect}. It hits me ${metaphor}, and I have to pause just to collect myself.`;
    p3 = `I don't think you fully grasp the effect you have on me. Every little movement, every breath you take around me... it all matters.`;
  } else if (patternSeed === 1) {
    p1 = `Have I ever really explained what happens to me when you ${action}? It is genuinely ${emotion}.`;
    p2 = `You do it so naturally, without even trying, but for me, ${effect}. It feels ${metaphor}, wrapping completely around my senses.`;
    p3 = `It's in these tiny, seemingly insignificant moments that I realize just how deep I am in this. I wouldn't trade that feeling for anything.`;
  } else {
    p1 = `There is a specific kind of magic in the way you ${action}. Just you, being exactly who you are, is absolutely ${emotion}.`;
    p2 = `I watch you, and suddenly ${effect}. It sweeps over me ${metaphor}, completely changing the trajectory of my entire day.`;
    p3 = `Sometimes I just want to pause time so I can appreciate you a little bit longer. You are an absolute vision.`;
  }

  const closings = [
    `Page ${pageNum} — and my heart is still racing.`,
    `Page ${pageNum} — wishing you were right here with me.`,
    `Page ${pageNum} — written with an embarrassing amount of love.`,
    `Page ${pageNum} — completely, undeniably yours.`,
    `Page ${pageNum} — and I am still falling for you.`
  ];
  const closing = pick(closings, pageNum * 6.7);

  return `
    <div class="page-heading">Thinking Of You 💕</div>
    ${memoryBlock}
    <div class="page-text">${p1}</div>
    <div class="page-text">${p2}</div>
    <div class="flirty-callout">" ${flirty} "</div>
    <div class="page-text">${p3}</div>
    ${uniquePoem}
    <div class="page-text italic">${deep}</div>
    <div class="divider">✦ ✦ ✦</div>
    <div class="page-text" style="text-align:center; font-size: 0.85rem; font-style: italic;">${closing}</div>
  `;
}

// ============================================================
// APP STATE & LOGIC
// ============================================================
let currentPage = 1;
let isFlipping = false;
let touchStartX = 0;
let touchStartY = 0;

function openBook() {
  const cs = document.getElementById('cover-screen');
  cs.classList.add('cover-opening');
  createSparkles(window.innerWidth / 2, window.innerHeight / 2);
  setTimeout(() => {
    cs.style.display = 'none';
    const reader = document.getElementById('reader');
    reader.classList.add('visible');
    renderPage(1);
  }, 1300);
}

function renderPage(num, direction) {
  currentPage = Math.max(1, Math.min(TOTAL_PAGES, num));
  const inner = document.getElementById('pageInner');
  const book = document.getElementById('book');
  const page = document.getElementById('currentPage');

  if (currentPage >= BODY_SECTION_START) {
    page.classList.add('body-section');
  } else {
    page.classList.remove('body-section');
  }

  if (direction) {
    book.classList.remove('flipping-forward', 'flipping-back');
    void book.offsetWidth;
    book.classList.add(direction === 'forward' ? 'flipping-forward' : 'flipping-back');
    spawnPageSparkles();
    setTimeout(() => { book.classList.remove('flipping-forward', 'flipping-back'); }, 650);
  }

  inner.innerHTML = generatePageContent(currentPage);

  const numL = document.getElementById('pageNumLeft');
  const numR = document.getElementById('pageNumRight');
  if (currentPage % 2 === 0) {
    numL.textContent = currentPage; numR.textContent = '';
  } else {
    numL.textContent = ''; numR.textContent = currentPage;
  }

  document.getElementById('pageCounter').textContent = `${currentPage} / ${TOTAL_PAGES}`;
  const pct = (currentPage / TOTAL_PAGES) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= TOTAL_PAGES;
  document.getElementById('ribbon').style.height = (40 + pct * 0.3) + 'px';

  if ([100,200,300,400,500,600,700].includes(currentPage)) spawnConfetti();

  inner.scrollTop = 0;
}

function nextPage() {
  if (isFlipping || currentPage >= TOTAL_PAGES) return;
  isFlipping = true; renderPage(currentPage + 1, 'forward');
  setTimeout(() => { isFlipping = false; }, 700);
}

function prevPage() {
  if (isFlipping || currentPage <= 1) return;
  isFlipping = true; renderPage(currentPage - 1, 'back');
  setTimeout(() => { isFlipping = false; }, 700);
}

function jumpToPage() {
  const val = parseInt(document.getElementById('jumpInput').value);
  if (val >= 1 && val <= TOTAL_PAGES) {
    renderPage(val);
    document.getElementById('jumpInput').value = '';
    createSparkles(window.innerWidth / 2, window.innerHeight / 3);
  }
}

document.getElementById('jumpInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') jumpToPage();
});

function spawnPageSparkles() {
  const book = document.getElementById('book');
  const rect = book.getBoundingClientRect();
  const emojis = ['✨','💕','🌸','💗','⭐','🌷','💫','🔥'];
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'page-sparkle';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = (rect.left + rect.width * 0.6 + Math.random() * rect.width * 0.3) + 'px';
    s.style.top = (rect.top + Math.random() * rect.height) + 'px';
    s.style.position = 'fixed'; s.style.zIndex = '999';
    s.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

const stage = document.querySelector('.book-stage');
stage.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, { passive: true });
stage.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) nextPage(); else prevPage();
  }
}, { passive: true });

stage.addEventListener('click', (e) => {
  const book = document.getElementById('book');
  const rect = book.getBoundingClientRect();
  const relX = e.clientX - rect.left;
  if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
    createSparkles(e.clientX, e.clientY);
    if (relX > rect.width * 0.6) nextPage();
    else if (relX < rect.width * 0.4) prevPage();
  }
});

function setupFairyLights() {
  const container = document.getElementById('fairyLights');
  const types = ['bulb-warm', 'bulb-pink', 'bulb-white'];
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'bulb ' + types[i % types.length];
    b.style.animationDelay = (Math.random() * 2) + 's';
    container.appendChild(b);
  }
}
setupFairyLights();

function createHeartsBg() {
  const container = document.getElementById('heartsBg');
  const hearts = ['💗','💕','🌸','✨','💖','🌷','💓','🔥'];
  for (let i = 0; i < 22; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    h.style.animationDuration = (8 + Math.random() * 12) + 's';
    h.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(h);
  }
}
createHeartsBg();

function createSparkles(x, y) {
  const emojis = ['✨','💕','🌸','💗','⭐','🌷','💖'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
    s.style.top = (y + (Math.random() - 0.5) * 80) + 'px';
    s.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

function spawnConfetti() {
  const emojis = ['🎉','💕','🌸','✨','💗','🎊','🌷','💖','⭐'];
  for (let i = 0; i < 25; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = '-20px';
    c.style.animationDelay = (Math.random() * 1.5) + 's';
    c.style.fontSize = (0.9 + Math.random() * 0.8) + 'rem';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});
</script>
</body>
</html>
