<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FUN DEMO</title>

    <style>
        :root {
            --bg: #0b141a;
            --header-bg: #1f2c33;
            --chat-bg: #0b141a;
            --msg-her: #1f2c33;
            --msg-me: #005c4b;
            --typing-color: #8696a0;
            --btn-green: #25d366;
            --btn-dark: #1a2329;
            --text-light: #e9edef;
            --text-dim: #8696a0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            /* dynamic viewport height for mobile */;
        }

        /* Mobile phone frame */
        .phone-frame {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(37, 211, 102, 0.08);
        }

        @media (min-width: 431px) {
            .phone-frame {
                height: 93vh;
                height: 93dvh;
                max-height: 850px;
                border-radius: 28px;
                margin: 0 10px;
            }
            body {
                background: #0a0f14;
            }
        }

        /* Notch / status bar spacer */
        .status-bar-spacer {
            height: env(safe-area-inset-top, 8px);
            min-height: 8px;
            background: var(--header-bg);
            flex-shrink: 0;
        }

        /* Header */
        .header {
            background: var(--header-bg);
            color: var(--text-light);
            padding: 12px 16px;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            letter-spacing: 0.2px;
            position: relative;
            z-index: 2;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .back-arrow {
            font-size: 20px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            padding: 4px 2px;
        }
        .back-arrow:active {
            opacity: 1;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e87ba8, #c7648a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }
        .header-name {
            font-size: 15px;
            line-height: 1.1;
        }
        .header-status {
            font-size: 11px;
            color: var(--typing-color);
            font-weight: 400;
            line-height: 1.3;
        }
        .header-status.online {
            color: #25d366;
        }

        .header-icons {
            display: flex;
            gap: 14px;
            font-size: 18px;
            opacity: 0.7;
        }
        .header-icons span {
            cursor: pointer;
            padding: 2px;
            transition: opacity 0.2s;
        }
        .header-icons span:active {
            opacity: 1;
        }

        /* Chat area */
        .chat {
            flex: 1;
            padding: 12px 12px 8px 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: var(--chat-bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(37, 211, 102, 0.015) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 30%, rgba(37, 211, 102, 0.01) 0%, transparent 60%);
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .chat::-webkit-scrollbar {
            width: 3px;
        }
        .chat::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }

        /* Date divider */
        .date-divider {
            text-align: center;
            margin: 8px 0 12px;
        }
        .date-divider span {
            background: #1a2c33;
            color: #8696a0;
            font-size: 11px;
            padding: 5px 14px;
            border-radius: 8px;
            letter-spacing: 0.3px;
        }

        /* Messages */
        .msg {
            max-width: 78%;
            padding: 9px 13px;
            border-radius: 8px;
            color: var(--text-light);
            font-size: 14.5px;
            line-height: 1.45;
            opacity: 0;
            animation: fadeInUp 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            position: relative;
            word-wrap: break-word;
            letter-spacing: 0.1px;
            transition: transform 0.15s ease;
        }

        .msg:active {
            transform: scale(0.97);
            transition: transform 0.08s ease;
        }

        .me {
            background: var(--msg-me);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .her {
            background: var(--msg-her);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
        }

        /* Wobble animation for emotional messages */
        .msg.wobble {
            animation: fadeInUp 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards,
                wobble 0.6s ease-out 0.45s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.94);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes wobble {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-3px);
            }
            40% {
                transform: translateX(3px);
            }
            60% {
                transform: translateX(-2px);
            }
            80% {
                transform: translateX(1px);
            }
        }

        /* Typing indicator */
        .typing {
            max-width: 70%;
            padding: 10px 14px;
            margin: 2px 0;
            border-radius: 8px;
            background: var(--msg-her);
            color: var(--typing-color);
            align-self: flex-start;
            font-size: 13px;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: fadeInUp 0.3s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            letter-spacing: 0.2px;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .typing-dots span {
            width: 7px;
            height: 7px;
            background: #8696a0;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(1) {
            animation-delay: 0s;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Footer / Button area */
        .footer {
            flex-shrink: 0;
            padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
            background: var(--header-bg);
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .input-mock {
            flex: 1;
            background: #2a3942;
            border-radius: 24px;
            padding: 10px 16px;
            color: #8696a0;
            font-size: 14px;
            cursor: default;
            letter-spacing: 0.2px;
        }

        .mic-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2a3942;
            border: none;
            color: #8696a0;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .mic-btn:active {
            background: #354550;
            transform: scale(0.93);
        }

        /* Surprise heart burst */
        .heart-burst {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            animation: floatUp 1.8s ease-out forwards;
            font-size: 24px;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translateY(-60px) scale(1.4) rotate(15deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-140px) scale(0.3) rotate(-20deg);
            }
        }

        /* Tap ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(37, 211, 102, 0.25);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Seen receipt */
        .seen-receipt {
            align-self: flex-end;
            font-size: 10px;
            color: #8696a0;
            margin-top: -2px;
            margin-right: 4px;
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeInUp 0.4s forwards;
            letter-spacing: 0.3px;
        }
    </style>
</head>

<body>

    <div class="phone-frame">
        <!-- Status bar spacer for notched phones -->
        <div class="status-bar-spacer"></div>

        <!-- Header -->
        <div class="header">
            <span class="back-arrow">←</span>
            <div class="avatar">🐥</div>
            <div class="header-info">
                <div class="header-name">Madam</div>
                <div class="header-status online" id="headerStatus">online</div>
            </div>
            <div class="header-icons">
                <span>📞</span>
                <span>⋮</span>
            </div>
        </div>

        <!-- Chat -->
        <div class="chat" id="chat">
            <div class="date-divider"><span>TODAY</span></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="input-mock">Type a message...</div>
            <button class="mic-btn" id="micBtn" aria-label="Send love">🎤</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const headerStatus = document.getElementById("headerStatus");
        const micBtn = document.getElementById("micBtn");

        /* ── Extended conversation with lots of apology texts ── */
        const messages = [
            // Opening
            { text: "Hey... 🥺", type: "me" },
            { text: "I know you're angry...", type: "me" },
            { text: "And honestly... I deserve it 😔", type: "me" },

            { typing: true, delay: 2200 },
            { text: "...", type: "her" },

            { text: "Please don't ignore me 😢", type: "me" },
            { text: "I didn't mean to hurt you", type: "me" },

            { typing: true, delay: 2800 },
            { text: "Then why did you? 😕", type: "her" },

            { text: "I messed up... I'm really sorry 💔", type: "me" },
            { text: "I swear I'll make it up to you", type: "me", wobble: true },

            { typing: true, delay: 3200 },
            { text: "You always say that... 😞", type: "her" },

            // More apology texts
            { text: "I know... and I hate that I let you down", type: "me" },
            { text: "But this time I mean it from the bottom of my heart 💚", type: "me" },
            { text: "I am surryyyyyy 😭😭😭", type: "me", wobble: true },

            { typing: true, delay: 2500 },
            { text: "surryyyyyy? 😂", type: "her" },

            { text: "YESSS surryyyyyy nahhh huhu surryy 🥺", type: "me", wobble: true },
            { text: "I am yours... completely yours 💖", type: "me" },
            { text: "I don't wanna lose you... ever", type: "me" },

            { typing: true, delay: 3000 },
            { text: "Hmm... 😶", type: "her" },

            { text: "Please baby... I'll do anything", type: "me" },
            { text: "Anything at all... just name it", type: "me" },
            { text: "I'll bring you flowers 🌹 chocolates 🍫 whatever you want", type: "me" },

            { typing: true, delay: 2800 },
            { text: "Anything? 🤨", type: "her" },

            { text: "Yes anything!!! I promise 💯", type: "me", wobble: true },
            { text: "I am surryyyyyy I am yours nahhh huhu surryy 😭💚", type: "me", wobble: true },

            { typing: true, delay: 3500 },
            { text: "You're so dramatic... 😅", type: "her" },

            { text: "Dramatic for you only 🥰", type: "me" },
            { text: "Because you mean the world to me 🌍💖", type: "me" },
            { text: "I can't imagine a day without you", type: "me" },

            { typing: true, delay: 3000 },
            { text: "You really hurt me though... 💔", type: "her" },

            { text: "I know... and I'll carry that guilt", type: "me" },
            { text: "But I'll also spend every day making it right", type: "me" },
            { text: "I am yours... nahhh huhu... I'm so sorry 😢", type: "me", wobble: true },
            { text: "Please give me one chance... just one 🥺🙏", type: "me" },

            { typing: true, delay: 4000 },
            { text: "...", type: "her" },
            { typing: true, delay: 2500 },
            { text: "Okay... one chance 😤💚", type: "her" },

            { text: "REALLY?! 😭😭😭💖💖💖", type: "me", wobble: true },
            { text: "THANK YOU THANK YOU THANK YOU", type: "me" },
            { text: "I won't mess this up... I swear on my life", type: "me" },
            { text: "I am yours forever... nahhh huhu surryyyyyy 💚💚💚", type: "me", wobble: true },

            { typing: true, delay: 3000 },
            { text: "You better not... 😌💖", type: "her" },

            { text: "I won't... I love you so much 💚", type: "me" },
            { text: "Like... SOOOOO much 🥰", type: "me" },
            { text: "My heart is yours... always was, always will be", type: "me" },
            { text: "Surryyyyyy nahhh huhu I am yourssss 😭💖", type: "me", wobble: true },

            { typing: true, delay: 2500 },
            { text: "I love you too... idiot 😂💚", type: "her" },

            { text: "Your idiot... forever 🥺💖", type: "me" },
            { text: "💚💚💚💚💚", type: "me" },
        ];

        let i = 0;
        let isFinished = false;

        /* Create message element */
        function addMessage(text, type, wobble = false) {
            const msg = document.createElement("div");
            msg.className = "msg " + type;
            if (wobble) msg.classList.add("wobble");
            msg.innerText = text;

            // Add ripple on tap
            msg.addEventListener("click", function(e) {
                const ripple = document.createElement("span");
                ripple.className = "ripple";
                const rect = msg.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = size + "px";
                ripple.style.height = size + "px";
                ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
                ripple.style.top = (e.clientY - rect.top - size / 2) + "px";
                msg.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);

                // Burst hearts on apology messages
                if (type === "me" && (text.includes("surry") || text.includes("sorry") || text
                        .includes("yours"))) {
                    burstHearts(e.clientX, e.clientY);
                }
            });

            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        /* Typing indicator */
        function showTyping(delay, callback) {
            const typing = document.createElement("div");
            typing.className = "typing";
            typing.innerHTML = 'typing <span class="typing-dots"><span></span><span></span><span></span></span>';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            // Update header status
            headerStatus.textContent = "typing...";
            headerStatus.classList.remove("online");
            headerStatus.style.color = "#25d366";

            setTimeout(() => {
                typing.remove();
                headerStatus.textContent = "online";
                headerStatus.classList.add("online");
                headerStatus.style.color = "#25d366";
                callback();
            }, delay);
        }

        /* Heart burst animation */
        function burstHearts(x, y) {
            const hearts = ["💚", "💖", "🥺", "💕", "✨", "💗", "🌸", "💝"];
            const count = 6;
            for (let h = 0; h < count; h++) {
                const heart = document.createElement("div");
                heart.className = "heart-burst";
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = x + "px";
                heart.style.top = y + "px";
                heart.style.animationDuration = (1.4 + Math.random() * 1.8) + "s";
                heart.style.fontSize = (18 + Math.random() * 22) + "px";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 2000);
            }
        }

        /* Seen receipt */
        function showSeenReceipt() {
            const seen = document.createElement("div");
            seen.className = "seen-receipt";
            seen.innerText = "✓✓ Seen";
            chat.appendChild(seen);
            chat.scrollTop = chat.scrollHeight;
        }

        /* Flow */
        function runChat() {
            if (i >= messages.length) {
                if (!isFinished) {
                    isFinished = true;
                    setTimeout(showSeenReceipt, 1200);
                    // Keep the footer interactive
                    micBtn.style.background = "#25d366";
                    micBtn.style.color = "#fff";
                    micBtn.style.cursor = "pointer";
                    micBtn.title = "Send love 💚";
                }
                return;
            }

            const msg = messages[i];

            if (msg.typing) {
                showTyping(msg.delay, () => {
                    i++;
                    runChat();
                });
            } else {
                addMessage(msg.text, msg.type, msg.wobble || false);
                i++;
                const nextDelay = msg.type === "her" ? 1800 : (msg.wobble ? 1600 : 1200);
                setTimeout(runChat, nextDelay);
            }
        }

        /* Mic button interaction */
        micBtn.addEventListener("click", () => {
            if (isFinished) {
                // Send a final love note
                const loveNotes = [
                    "I love you 💚",
                    "You're my everything 🌸",
                    "Surryyyyyy forever 😭💖",
                    "Nahhh huhu I'm yours 🥺",
                    "My heart beats for you 💗",
                ];
                const note = loveNotes[Math.floor(Math.random() * loveNotes.length)];
                addMessage(note, "me", true);
                chat.scrollTop = chat.scrollHeight;
                burstHearts(window.innerWidth / 2, window.innerHeight / 2);

                // Simulate reply
                setTimeout(() => {
                    showTyping(2000 + Math.random() * 2000, () => {
                        const replies = [
                            "Awww stop it 😂💖",
                            "You're so cute 🥰",
                            "Okay okay I get it 😌💚",
                            "I love you more 💕",
                            "Nahhh huhu you're mine 😤💗",
                        ];
                        addMessage(replies[Math.floor(Math.random() * replies.length)], "her");
                        chat.scrollTop = chat.scrollHeight;
                    });
                }, 800);
            } else {
                // Gently pulse the chat to indicate it's still playing
                chat.style.transition = "transform 0.15s ease";
                chat.style.transform = "scale(0.985)";
                setTimeout(() => {
                    chat.style.transform = "scale(1)";
                }, 150);
                headerStatus.textContent = "wait for it... 💚";
                setTimeout(() => {
                    headerStatus.textContent = "online";
                }, 1500);
            }
        });

        /* Start the chat after a short delay */
        setTimeout(runChat, 600);

        /* Handle resize for mobile */
        window.addEventListener("resize", () => {
            chat.scrollTop = chat.scrollHeight;
        });

        /* Prevent double-tap zoom on buttons */
        document.querySelectorAll("button").forEach(btn => {
            btn.addEventListener("touchstart", function(e) {
                e.preventDefault();
                this.click();
            }, { passive: false });
        });
    </script>
</body>
</html>
