<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Book Just For You 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Dancing+Script:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #f9c8d9;
    --rose: #e8799e;
    --deep-rose: #c0446b;
    --petal: #fde8f0;
    --cream: #fff8fa;
    --gold: #d4a0b0;
    --text: #5a2a3a;
    --soft: #f0b8cb;
    --white: #ffffff;
    --shadow: rgba(192, 75, 107, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: linear-gradient(135deg, #ffe0ec 0%, #fcd1e2 30%, #fbbdcf 60%, #f9a8c0 100%);
    min-height: 100vh;
    font-family: 'Lora', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Floating hearts background */
  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .heart-float {
    position: absolute;
    font-size: 1.2rem;
    opacity: 0.15;
    animation: floatUp linear infinite;
    bottom: -30px;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.15; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* Sparkles */
  .sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 1rem;
    z-index: 9999;
    animation: sparkleAnim 0.8s forwards;
  }
  @keyframes sparkleAnim {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg) translateY(-30px); opacity: 0; }
  }

  /* Cover screen */
  #cover-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #fde8f0 0%, #f9c8d9 40%, #f0a0bc 100%);
  }

  .cover-book-wrap {
    perspective: 1200px;
    cursor: pointer;
    user-select: none;
  }

  .cover-book {
    width: min(280px, 80vw);
    height: min(370px, 55vh);
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.34,1.56,.64,1);
    filter: drop-shadow(0 20px 40px rgba(192,68,107,0.35));
  }
  .cover-book:hover { transform: rotateY(-12deg) rotateX(5deg) scale(1.03); }

  .book-cover {
    position: absolute;
    inset: 0;
    border-radius: 6px 18px 18px 6px;
    background: linear-gradient(145deg, #e8799e 0%, #c0446b 50%, #9b2d4f 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    box-shadow: inset -4px 0 12px rgba(0,0,0,0.2), inset 4px 0 8px rgba(255,255,255,0.15);
    border-left: 6px solid #8a1f40;
  }

  .cover-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.5rem, 6vw, 2.2rem);
    color: #fff;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    line-height: 1.3;
    margin-bottom: 16px;
  }
  .cover-heart-big { font-size: clamp(2.5rem, 10vw, 4rem); margin: 10px 0; animation: heartbeat 1.5s ease-in-out infinite; }
  @keyframes heartbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .cover-sub {
    font-family: 'Lora', serif;
    font-style: italic;
    color: rgba(255,255,255,0.85);
    font-size: clamp(0.75rem, 3vw, 0.95rem);
    text-align: center;
    margin-top: 12px;
  }
  .cover-ornament {
    color: rgba(255,255,255,0.5);
    font-size: 1.2rem;
    letter-spacing: 8px;
    margin: 8px 0;
  }
  .book-spine {
    position: absolute;
    left: 0; top: 0;
    width: 6px; height: 100%;
    background: linear-gradient(to right, #7a1535, #a02848);
    border-radius: 6px 0 0 6px;
  }

  .tap-hint {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.7; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-4px); } }
  .tap-hint span {
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem;
    color: var(--deep-rose);
    text-shadow: 0 1px 4px rgba(255,255,255,0.6);
  }
  .tap-hint .arrow { font-size: 1.6rem; }

  /* Cover open animation */
  .cover-opening .cover-book {
    animation: bookOpen 1.2s cubic-bezier(.77,0,.18,1) forwards;
  }
  @keyframes bookOpen {
    0% { transform: rotateY(0deg) scale(1); }
    40% { transform: rotateY(-30deg) scale(1.05); }
    100% { transform: rotateY(-90deg) scale(0.8) translateX(-40px); opacity: 0; }
  }
  .cover-opening {
    animation: coverFade 1.3s forwards;
  }
  @keyframes coverFade {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }

  /* Main book reader */
  #reader {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(160deg, #ffe0ec 0%, #fcd1e2 40%, #fbbdcf 100%);
  }
  #reader.visible { display: flex; }

  /* Top bar */
  .top-bar {
    width: 100%;
    padding: 10px 14px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(232,121,158,0.2);
    flex-shrink: 0;
  }
  .top-title {
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem;
    color: var(--deep-rose);
  }
  .page-jump-form {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid var(--rose);
    border-radius: 20px;
    padding: 3px 10px;
  }
  .page-jump-form input {
    width: 52px;
    border: none;
    background: transparent;
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    text-align: center;
  }
  .page-jump-form button {
    background: var(--rose);
    border: none;
    color: white;
    border-radius: 50%;
    width: 22px; height: 22px;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
  }
  .page-counter {
    font-family: 'Dancing Script', cursive;
    font-size: 1rem;
    color: var(--deep-rose);
    min-width: 60px;
    text-align: right;
  }

  /* Book stage */
  .book-stage {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1500px;
    overflow: hidden;
    position: relative;
  }

  /* The actual book */
  .book {
    width: min(340px, 95vw);
    height: min(520px, calc(100vh - 130px));
    position: relative;
    transform-style: preserve-3d;
  }

  /* Pages */
  .page-container {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
  }

  .page {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 4px 16px 16px 4px;
    background: var(--cream);
    backface-visibility: hidden;
    overflow: hidden;
    box-shadow: 2px 4px 20px rgba(192,68,107,0.15), inset -2px 0 8px rgba(0,0,0,0.05);
  }

  .page-inner {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 28px 22px 80px;
    scrollbar-width: thin;
    scrollbar-color: var(--soft) transparent;
  }
  .page-inner::-webkit-scrollbar { width: 3px; }
  .page-inner::-webkit-scrollbar-track { background: transparent; }
  .page-inner::-webkit-scrollbar-thumb { background: var(--soft); border-radius: 3px; }

  /* Page flip animation */
  .book.flipping-forward .page-container {
    animation: flipForward 0.7s cubic-bezier(.77,0,.18,1) forwards;
    transform-origin: left center;
  }
  .book.flipping-back .page-container {
    animation: flipBack 0.7s cubic-bezier(.77,0,.18,1) forwards;
    transform-origin: left center;
  }
  @keyframes flipForward {
    0% { transform: rotateY(0deg); box-shadow: 2px 4px 20px rgba(192,68,107,0.15); }
    50% { transform: rotateY(-90deg); box-shadow: -10px 4px 30px rgba(192,68,107,0.3); z-index: 10; }
    100% { transform: rotateY(-180deg); }
  }
  @keyframes flipBack {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(90deg); box-shadow: 10px 4px 30px rgba(192,68,107,0.3); z-index: 10; }
    100% { transform: rotateY(180deg); }
  }

  /* Page decorations */
  .page-deco-top {
    position: absolute;
    top: 10px; left: 0; right: 0;
    text-align: center;
    font-size: 0.8rem;
    color: var(--rose);
    opacity: 0.5;
    letter-spacing: 4px;
  }
  .page-deco-bottom {
    position: absolute;
    bottom: 14px; left: 0; right: 0;
    text-align: center;
    font-size: 0.75rem;
    color: var(--rose);
    opacity: 0.4;
  }
  .page-num-display {
    position: absolute;
    bottom: 14px;
    font-family: 'Dancing Script', cursive;
    font-size: 0.9rem;
    color: var(--rose);
    opacity: 0.6;
  }
  .page-num-display.left { left: 18px; }
  .page-num-display.right { right: 18px; }

  /* Content styles */
  .page-heading {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem, 5vw, 1.7rem);
    color: var(--deep-rose);
    text-align: center;
    margin-bottom: 16px;
    line-height: 1.3;
  }
  .page-heading .emoji { font-size: 1.4em; }
  .page-text {
    font-family: 'Lora', serif;
    font-size: clamp(0.82rem, 3.2vw, 0.95rem);
    color: var(--text);
    line-height: 1.85;
    text-align: justify;
    margin-bottom: 14px;
  }
  .page-text.italic { font-style: italic; }
  .poem-block {
    background: linear-gradient(135deg, rgba(249,200,217,0.3), rgba(232,121,158,0.1));
    border-left: 3px solid var(--rose);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    margin: 14px 0;
  }
  .poem-block p {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: clamp(0.8rem, 3vw, 0.9rem);
    color: var(--deep-rose);
    line-height: 2;
    margin: 0;
  }
  .divider {
    text-align: center;
    margin: 16px 0;
    color: var(--rose);
    font-size: 1.1rem;
    opacity: 0.6;
    letter-spacing: 6px;
  }
  .highlight {
    background: linear-gradient(120deg, rgba(249,200,217,0.5) 0%, rgba(249,200,217,0.5) 100%);
    border-radius: 4px;
    padding: 0 3px;
    font-weight: 600;
  }
  .body-feature-heading {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.2rem, 4.5vw, 1.5rem);
    color: var(--deep-rose);
    text-align: center;
    margin: 12px 0 10px;
  }
  .body-feature-icon {
    text-align: center;
    font-size: 1.8rem;
    margin: 8px 0;
  }

  /* Nav buttons */
  .nav-bar {
    width: 100%;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(232,121,158,0.2);
    flex-shrink: 0;
  }
  .nav-btn {
    background: linear-gradient(135deg, var(--rose), var(--deep-rose));
    border: none;
    color: white;
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Dancing Script', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(192,68,107,0.3);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
    user-select: none;
  }
  .nav-btn:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(192,68,107,0.2); }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }

  /* Progress */
  .progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: linear-gradient(to right, var(--rose), var(--deep-rose));
    transition: width 0.4s ease;
    border-radius: 0 2px 2px 0;
  }

  /* Swipe hint */
  .swipe-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Dancing Script', cursive;
    color: var(--deep-rose);
    font-size: 0.9rem;
    animation: fadeInOut 3s 2s forwards;
    pointer-events: none;
    white-space: nowrap;
  }
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
    20% { opacity: 1; transform: translateX(-50%) translateY(0); }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Confetti on special pages */
  .confetti-piece {
    position: fixed;
    font-size: 1.2rem;
    z-index: 200;
    pointer-events: none;
    animation: confettiFall 2.5s forwards ease-in;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Page corner fold */
  .page::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 0 20px 20px;
    border-color: transparent transparent rgba(232,121,158,0.2) transparent;
  }

  /* Ribbon bookmark */
  .ribbon {
    position: absolute;
    top: 0; right: 24px;
    width: 18px;
    background: linear-gradient(to bottom, #e8799e, #c0446b);
    border-radius: 0 0 4px 4px;
    z-index: 5;
    box-shadow: 2px 2px 6px rgba(192,68,107,0.3);
  }
  .ribbon::after {
    content: '';
    display: block;
    width: 0; height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-top: 10px solid #c0446b;
    position: absolute;
    bottom: -10px; left: 0;
  }

  /* Special: last 100 pages have pinkier bg */
  .page.body-section {
    background: linear-gradient(160deg, #fff0f6 0%, #ffe8f0 100%);
  }

  /* Responsive */
  @media (max-width: 380px) {
    .book { width: 95vw; }
  }
</style>
</head>
<body>

<!-- Floating hearts background -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- COVER SCREEN -->
<div id="cover-screen">
  <div class="cover-book-wrap" id="coverWrap" onclick="openBook()">
    <div class="cover-book" id="coverBook">
      <div class="book-spine"></div>
      <div class="cover-ornament">✦ ✦ ✦</div>
      <div class="cover-title">A Book Written<br>Only For You</div>
      <div class="cover-heart-big">💕</div>
      <div class="cover-ornament">✦ ✦ ✦</div>
      <div class="cover-sub">700 pages of love,<br>just for the most beautiful soul</div>
    </div>
  </div>
  <div class="tap-hint">
    <span class="arrow">💗</span>
    <span>Tap the book to open</span>
  </div>
</div>

<!-- READER -->
<div id="reader">
  <div class="top-bar">
    <div class="top-title">💕 For You</div>
    <div class="page-jump-form">
      <input type="number" id="jumpInput" min="1" max="700" placeholder="pg #">
      <button onclick="jumpToPage()">→</button>
    </div>
    <div class="page-counter" id="pageCounter">1 / 700</div>
  </div>

  <div class="book-stage">
    <div class="book" id="book">
      <div class="page-container" id="pageContainer">
        <div class="page" id="currentPage">
          <div class="ribbon" id="ribbon" style="height:60px;"></div>
          <div class="page-deco-top">❀ ❀ ❀</div>
          <div class="page-inner" id="pageInner"></div>
          <div class="page-deco-bottom">❀ ❀ ❀</div>
          <div class="page-num-display left" id="pageNumLeft"></div>
          <div class="page-num-display right" id="pageNumRight"></div>
        </div>
      </div>
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="swipe-hint">← swipe or tap buttons →</div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn" onclick="prevPage()">← Prev</button>
    <button class="nav-btn" id="nextBtn" onclick="nextPage()">Next →</button>
  </div>
</div>

<script>
// ============================================================
// CONTENT ENGINE — 700 pages of love
// ============================================================

const TOTAL_PAGES = 700;
const BODY_SECTION_START = 601; // pages 601-700

// All the base content blocks (love messages, poems, appreciations)
// We'll cycle/vary them across pages with small tweaks

const loveMessages = [
  // Block 1
  `<div class="page-heading">✨ You Are Everything ✨</div>
  <div class="page-text">If I could gather all the sweetest words in the world, they still would not be enough to describe how wonderful you are. You are the kind of person who makes everything around her brighter just by being there. Your smile feels like sunshine on my darkest days, and your laugh is the sweetest melody my heart has ever known.</div>
  <div class="page-text">You are so incredibly cute in every little way — in the way your eyes light up when you are happy, in the way your voice softens when you talk, and even in the tiny things you do without realizing how adorable you are. Every little detail about you feels so perfect to me, like you were made from all the loveliest parts of this world.</div>`,

  // Block 2
  `<div class="page-heading">💗 Your Heart is Beautiful</div>
  <div class="page-text">Your beauty is not just in how cute and gorgeous you are — it is in your heart. The way you care, the way you love, the way you make people feel special... it makes you the most beautiful person I have ever known. Your kindness is gentle, your love is warm, and your presence feels like home.</div>
  <div class="poem-block"><p>You are the prettiest little dream<br>that my heart never wants to wake from.<br>Like the first soft light of morning,<br>you arrive and make everything glow.</p></div>`,

  // Block 3
  `<div class="page-heading">🌸 How Lucky I Am</div>
  <div class="page-text">Sometimes I look at you and wonder how I got so lucky to have someone as precious as you in my life. You are beautiful, caring, lovely, and so unbelievably perfect in your own magical way. To me, you are not just amazing — you are everything sweet and beautiful wrapped into one perfect soul.</div>
  <div class="page-text">And if I had to choose my favorite thing in this world, it would always be you — because you are the most precious, cutest, and most perfect person my heart has ever loved.</div>`,

  // Block 4 — poem
  `<div class="page-heading">🌷 A Poem For You</div>
  <div class="poem-block"><p>You are the world feels warmer when you smile,<br>the skies feel brighter when you laugh,<br>and even the quietest moments become magical<br>when I am near you.<br><br>You are the gentle kind of beautiful<br>that words can never fully hold.<br>Your eyes carry a sparkle<br>that could outshine every star.</p></div>
  <div class="page-text">And your smile — oh, your smile — it is the sweetest thing my heart has ever known, the kind of smile that turns ordinary days into the most precious memories.</div>`,

  // Block 5
  `<div class="page-heading">🌺 Something So Lovely</div>
  <div class="page-text">There is something so soft and lovely about you, something that makes my heart melt in the sweetest way possible. The way you laugh, the way you speak, the way you care so deeply — every little thing about you feels like a tiny miracle to me.</div>
  <div class="page-text">You are cute in ways you do not even notice. In the way your face lights up with happiness, in the way your voice becomes soft and gentle, in the way your presence alone can calm every storm inside me.</div>`,

  // Block 6
  `<div class="page-heading">💖 You Are My Peace</div>
  <div class="page-text">You are the kind of adorable that makes my heart smile even when no words are spoken. And beyond all your sweetness, you are the most beautiful soul I know. Your heart is full of kindness, your love is full of warmth, and your care wraps around me like the safest place in the world.</div>
  <div class="poem-block"><p>Being loved by you feels like finding home —<br>soft, peaceful, warm, and full of light.<br>I never want to leave this feeling,<br>this beautiful place you built in my heart.</p></div>`,

  // Block 7
  `<div class="page-heading">⭐ Made by the Stars</div>
  <div class="page-text">Sometimes I wonder how someone so lovely can even exist. How can one person be so beautiful, so caring, so sweet, and so perfect all at once? It feels like the stars themselves must have spent extra time creating you, carefully placing every wonderful thing in your heart to make someone as precious as you.</div>
  <div class="divider">✦ ✦ ✦</div>
  <div class="page-text">When I think of beauty, I think of you. Not just because your smile is lovely or because your eyes shine so brightly, but because your whole existence is beautiful to me.</div>`,

  // Block 8
  `<div class="page-heading">🌹 Everything is Beautiful</div>
  <div class="page-text">Your kindness is beautiful. Your laughter is beautiful. Your heart is beautiful. Everything about you is beautiful in ways beyond words.</div>
  <div class="poem-block"><p>You are the softest chapter in the story of my life.<br>The sweetest thought in my mind.<br>The gentlest feeling in my heart.<br>You are the kind of person who makes life feel lighter,<br>love feel deeper,<br>and happiness feel endless.</p></div>`,

  // Block 9
  `<div class="page-heading">💕 Before You</div>
  <div class="page-text">Before you, I never knew a person could mean so much. I never knew someone's presence alone could bring so much peace. But then you came into my life, and suddenly the world felt brighter, my heart felt fuller, and love felt more beautiful than ever before.</div>

    while (allBodyPages.length < 100) {
      const extras = bodyAppreciation[bodyAppreciation.length - 1].text;
      allBodyPages.push(extras[allBodyPages.length % extras.length]);
    }

    const idx = Math.min(offset, allBodyPages.length - 1);
    return allBodyPages[idx];
  }

  // Normal pages 2-600
  // Mix love messages and poems
  const isPoem = (pageNum % 7 === 0 || pageNum % 13 === 0);
  if (isPoem) {
    const poem = poems[(pageNum - 2) % poems.length];
    // Add page-specific variation
    const variation = [
      `<div class="page-text">You are so loved. So deeply, completely, endlessly loved. And that will never, ever change.</div>`,
      `<div class="page-text">Every time I think of you, I feel the warmest, most wonderful feeling. You do that. Just by existing, you make everything better.</div>`,
      `<div class="page-text">There is no version of any day that would not be made better by you in it. You are sunshine in human form.</div>`,
      `<div class="page-text">The world is genuinely, measurably more beautiful because you are in it. That is not poetry — that is simply the truth.</div>`,
    ];
    return poem + variation[(pageNum) % variation.length];
  }

  // Love message — rotate through all
  const msgIdx = (pageNum - 2) % loveMessages.length;
  const msg = loveMessages[msgIdx];

  // Add a unique footer thought per page to give variety
  const footers = [
    `<div class="divider">✦ ✦ ✦</div><div class="page-text italic" style="text-align:center;font-size:0.85rem;">Page ${pageNum} of love, written just for you 💕</div>`,
    `<div class="divider">❀ ❀ ❀</div><div class="page-text italic" style="text-align:center;font-size:0.85rem;">You are loved more than words can hold.</div>`,
    `<div class="divider">✦ ✦ ✦</div><div class="page-text italic" style="text-align:center;font-size:0.85rem;">Every page, every word — only for you. 💗</div>`,
    `<div class="divider">❀ ❀ ❀</div><div class="page-text italic" style="text-align:center;font-size:0.85rem;">You are my favorite everything.</div>`,
    `<div class="divider">✦ ✦ ✦</div><div class="page-text italic" style="text-align:center;font-size:0.85rem;">Still ${TOTAL_PAGES - pageNum} more pages of love to go... 💕</div>`,
  ];
  return msg + footers[pageNum % footers.length];
}

// ============================================================
// APP STATE
// ============================================================
let currentPage = 1;
let isFlipping = false;
let touchStartX = 0;
let touchStartY = 0;

// ============================================================
// OPEN BOOK
// ============================================================
function openBook() {
  const cs = document.getElementById('cover-screen');
  cs.classList.add('cover-opening');
  createSparkles(window.innerWidth / 2, window.innerHeight / 2);
  setTimeout(() => {
    cs.style.display = 'none';
    const reader = document.getElementById('reader');
    reader.classList.add('visible');
    renderPage(1);
  }, 1300);
}

// ============================================================
// RENDER PAGE
// ============================================================
function renderPage(num, direction) {
  currentPage = Math.max(1, Math.min(TOTAL_PAGES, num));

  const inner = document.getElementById('pageInner');
  const book = document.getElementById('book');
  const container = document.getElementById('pageContainer');

  // Apply body section class
  const page = document.getElementById('currentPage');
  if (currentPage >= BODY_SECTION_START) {
    page.classList.add('body-section');
  } else {
    page.classList.remove('body-section');
  }

  // Animate
  if (direction) {
    book.classList.remove('flipping-forward', 'flipping-back');
    void book.offsetWidth;
    book.classList.add(direction === 'forward' ? 'flipping-forward' : 'flipping-back');
    setTimeout(() => {
      book.classList.remove('flipping-forward', 'flipping-back');
    }, 700);
  }

  // Set content
  inner.innerHTML = generatePageContent(currentPage);

  // Page number display
  const numL = document.getElementById('pageNumLeft');
  const numR = document.getElementById('pageNumRight');
  if (currentPage % 2 === 0) {
    numL.textContent = currentPage;
    numR.textContent = '';
  } else {
    numL.textContent = '';
    numR.textContent = currentPage;
  }

  // Counter
  document.getElementById('pageCounter').textContent = `${currentPage} / ${TOTAL_PAGES}`;

  // Progress bar
  const pct = (currentPage / TOTAL_PAGES) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  // Nav buttons
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= TOTAL_PAGES;

  // Ribbon height changes with progress
  document.getElementById('ribbon').style.height = (40 + pct * 0.3) + 'px';

  // Confetti on milestone pages
  if (currentPage === 100 || currentPage === 200 || currentPage === 300 || currentPage === 400 || currentPage === 500 || currentPage === 600 || currentPage === 700) {
    spawnConfetti();
  }

  // Scroll back to top of page inner
  inner.scrollTop = 0;
}

function nextPage() {
  if (isFlipping || currentPage >= TOTAL_PAGES) return;
  isFlipping = true;
  renderPage(currentPage + 1, 'forward');
  setTimeout(() => { isFlipping = false; }, 750);
}

function prevPage() {
  if (isFlipping || currentPage <= 1) return;
  isFlipping = true;
  renderPage(currentPage - 1, 'back');
  setTimeout(() => { isFlipping = false; }, 750);
}

function jumpToPage() {
  const val = parseInt(document.getElementById('jumpInput').value);
  if (val >= 1 && val <= TOTAL_PAGES) {
    renderPage(val);
    document.getElementById('jumpInput').value = '';
    createSparkles(window.innerWidth / 2, window.innerHeight / 3);
  }
}

// Jump on Enter key
document.getElementById('jumpInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') jumpToPage();
});

// ============================================================
// TOUCH / SWIPE
// ============================================================
const stage = document.querySelector('.book-stage');
stage.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

stage.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) nextPage();
    else prevPage();
  }
}, { passive: true });

// ============================================================
// FLOATING HEARTS
// ============================================================
function createHeartsBg() {
  const container = document.getElementById('heartsBg');
  const hearts = ['💗','💕','🌸','✨','💖','🌷','💓','❀'];
  for (let i = 0; i < 20; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    h.style.animationDuration = (8 + Math.random() * 12) + 's';
    h.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(h);
  }
}
createHeartsBg();

// ============================================================
// SPARKLES
// ============================================================
function createSparkles(x, y) {
  const emojis = ['✨','💕','🌸','💗','⭐','🌷','💖'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
    s.style.top = (y + (Math.random() - 0.5) * 80) + 'px';
    s.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

// Tap to create sparkles on book stage
stage.addEventListener('click', (e) => {
  if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
    createSparkles(e.clientX, e.clientY);
  }
});

// ============================================================
// CONFETTI
// ============================================================
function spawnConfetti() {
  const emojis = ['🎉','💕','🌸','✨','💗','🎊','🌷','💖','⭐'];
  for (let i = 0; i < 20; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = '-20px';
    c.style.animationDelay = (Math.random() * 1.5) + 's';
    c.style.fontSize = (0.9 + Math.random() * 0.8) + 'rem';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// ============================================================
// KEYBOARD NAVIGATION
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});
</script>
</body>
</html>
