<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Book Just For You 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Dancing+Script:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #f9c8d9;
    --rose: #e8799e;
    --deep-rose: #c0446b;
    --petal: #fde8f0;
    --cream: #fff8fa;
    --gold: #d4a873;
    --gold-bright: #f5c842;
    --text: #5a2a3a;
    --soft: #f0b8cb;
    --white: #ffffff;
    --shadow: rgba(192, 75, 107, 0.18);
    --pink-cover: #e0607a;
    --pink-cover-dark: #c84060;
    --pink-cover-light: #f07a95;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: linear-gradient(135deg, #ffe0ec 0%, #fcd1e2 30%, #fbbdcf 60%, #f9a8c0 100%);
    min-height: 100vh;
    font-family: 'Lora', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Floating elements background */
  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .heart-float {
    position: absolute;
    font-size: 1.2rem;
    opacity: 0.15;
    animation: floatUp linear infinite;
    bottom: -30px;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.15; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* Sparkles */
  .sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 1rem;
    z-index: 9999;
    animation: sparkleAnim 0.8s forwards;
  }
  @keyframes sparkleAnim {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg) translateY(-30px); opacity: 0; }
  }

  /* ===========================
     COVER SCREEN — Luna Style
     =========================== */
  #cover-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #ffe0ec 0%, #fcd1e2 40%, #f9a8c0 100%);
  }

  /* Wooden desk surface feel */
  #cover-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(210,160,100,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255,220,180,0.1) 0%, transparent 40%);
    pointer-events: none;
  }

  /* Fairy lights */
  .fairy-lights {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 18px;
    padding-bottom: 8px;
    z-index: 2;
  }
  .bulb {
    width: 8px; height: 10px;
    border-radius: 50% 50% 40% 40%;
    position: relative;
    animation: glowBulb 2s ease-in-out infinite;
  }
  .bulb:nth-child(odd) { animation-delay: 0.3s; }
  .bulb:nth-child(3n) { animation-delay: 0.7s; }
  .bulb-warm { background: #ffe066; box-shadow: 0 0 8px 3px rgba(255,220,80,0.7); }
  .bulb-pink { background: #ff99bb; box-shadow: 0 0 8px 3px rgba(255,120,160,0.6); }
  .bulb-white { background: #fff5dd; box-shadow: 0 0 8px 3px rgba(255,240,200,0.8); }
  @keyframes glowBulb {
    0%,100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  /* Wire connecting bulbs */
  .fairy-lights::before {
    content: '';
    position: absolute;
    top: 12px; left: 5%; right: 5%;
    height: 1.5px;
    background: rgba(120,80,60,0.35);
    z-index: -1;
  }

  /* Floating flowers and lavender on sides */
  .side-deco {
    position: absolute;
    font-size: 1.4rem;
    opacity: 0.6;
    animation: gentleFloat 4s ease-in-out infinite;
  }
  @keyframes gentleFloat {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-8px) rotate(5deg); }
  }

  .cover-book-wrap {
    perspective: 1400px;
    cursor: pointer;
    user-select: none;
    position: relative;
    z-index: 3;
  }

  /* Luna-style book — pink, 3D, tilted */
  .cover-book {
    width: min(230px, 68vw);
    height: min(310px, 50vh);
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(12deg) rotateY(-18deg) rotateZ(-3deg);
    transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
    filter: drop-shadow(8px 20px 30px rgba(120,40,60,0.45));
  }
  .cover-book-wrap:hover .cover-book {
    transform: rotateX(8deg) rotateY(-8deg) rotateZ(-1deg) scale(1.04);
  }

  /* Main book face */
  .book-face {
    position: absolute;
    inset: 0;
    border-radius: 4px 14px 14px 4px;
    background: linear-gradient(160deg, var(--pink-cover-light) 0%, var(--pink-cover) 40%, var(--pink-cover-dark) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 16px 14px;
    overflow: hidden;
  }

  /* Gold border frame on cover */
  .book-face::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 2.5px solid var(--gold-bright);
    border-radius: 2px 10px 10px 2px;
    opacity: 0.7;
    pointer-events: none;
  }

  /* Stars in corner */
  .cover-stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .cover-star {
    position: absolute;
    color: var(--gold-bright);
    font-size: 0.9rem;
    opacity: 0.8;
    animation: twinkle 2s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .cover-title-area {
    text-align: center;
    z-index: 1;
    position: relative;
  }
  .cover-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    color: var(--gold-bright);
    text-shadow: 1px 2px 0 rgba(120,60,0,0.4), 0 0 12px rgba(255,220,80,0.4);
    line-height: 1.2;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* Illustration box in the middle of cover */
  .cover-illustration {
    width: 90%;
    flex: 1;
    margin: 8px 0;
    border-radius: 6px;
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1660 40%, #1a2a50 100%);
    border: 2px solid var(--gold);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* Night sky in illustration */
  .cover-illustration::before {
    content: '✦ ✧ ✦ ✧ ✦';
    position: absolute;
    top: 6px; left: 0; right: 0;
    text-align: center;
    font-size: 0.5rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 4px;
  }

  /* Moon */
  .illus-moon {
    position: absolute;
    top: 12px; right: 18px;
    font-size: 1rem;
    filter: brightness(1.3);
  }

  /* Tree silhouette */
  .illus-trees {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: 0 4px;
  }
  .illus-tree {
    background: rgba(20,40,20,0.8);
    border-radius: 50% 50% 0 0;
    position: relative;
  }

  /* Glowing path */
  .illus-path {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 30%;
    height: 40%;
    background: radial-gradient(ellipse at center bottom, rgba(100,220,100,0.3) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Little girl */
  .illus-girl { font-size: 1.1rem; position: relative; z-index: 2; }

  /* Mushrooms */
  .illus-mushroom {
    position: absolute;
    font-size: 0.7rem;
  }

  /* Tree house */
  .illus-house {
    position: absolute;
    top: 18px; right: 8px;
    font-size: 0.9rem;
    opacity: 0.8;
  }

  /* Ground glow */
  .illus-ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 25%;
    background: linear-gradient(to top, rgba(30,80,20,0.5) 0%, transparent 100%);
  }

  .cover-sub-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(0.7rem, 2.5vw, 0.85rem);
    color: rgba(255,255,255,0.85);
    text-align: center;
    z-index: 1;
    line-height: 1.4;
  }

  /* Book spine — left side */
  .book-spine-3d {
    position: absolute;
    top: 0;
    left: -22px;
    width: 22px;
    height: 100%;
    transform-origin: right center;
    background: linear-gradient(to right, #8a1f40, #a83060);
    border-radius: 4px 0 0 4px;
    transform: rotateY(90deg);
    box-shadow: inset -4px 0 8px rgba(0,0,0,0.3);
  }

  /* Book bottom thickness */
  .book-bottom-3d {
    position: absolute;
    bottom: -10px;
    left: 0; right: 0;
    height: 10px;
    background: linear-gradient(to bottom, #c0446b, #9b2d4f);
    transform-origin: top center;
    transform: rotateX(-90deg);
    border-radius: 0 0 4px 4px;
  }

  /* Gold star corners on cover */
  .corner-star {
    position: absolute;
    font-size: 0.9rem;
    color: var(--gold-bright);
  }
  .corner-star.tl { top: 14px; left: 14px; }
  .corner-star.tr { top: 14px; right: 14px; }
  .corner-star.bl { bottom: 14px; left: 14px; }
  .corner-star.br { bottom: 14px; right: 14px; }

  .tap-hint {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: pulse 2s ease-in-out infinite;
    z-index: 3;
    position: relative;
  }
  @keyframes pulse { 0%,100% { opacity: 0.7; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-5px); } }
  .tap-hint span {
    font-family: 'Dancing Script', cursive;
    font-size: 1.2rem;
    color: var(--deep-rose);
    text-shadow: 0 1px 4px rgba(255,255,255,0.6);
  }

  /* Cover open animation */
  .cover-opening .cover-book {
    animation: bookOpenCover 1.2s cubic-bezier(.77,0,.18,1) forwards;
  }
  @keyframes bookOpenCover {
    0% { transform: rotateX(12deg) rotateY(-18deg) rotateZ(-3deg); }
    40% { transform: rotateX(5deg) rotateY(-40deg) rotateZ(-2deg) scale(1.05); }
    100% { transform: rotateX(0deg) rotateY(-100deg) rotateZ(0deg) scale(0.8) translateX(-40px); opacity: 0; }
  }
  .cover-opening {
    animation: coverFade 1.3s forwards;
  }
  @keyframes coverFade {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }

  /* ===========================
     MAIN BOOK READER
     =========================== */
  #reader {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(160deg, #ffe0ec 0%, #fcd1e2 40%, #fbbdcf 100%);
  }
  #reader.visible { display: flex; }

  /* Top bar */
  .top-bar {
    width: 100%;
    padding: 10px 14px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(232,121,158,0.2);
    flex-shrink: 0;
  }
  .top-title {
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem;
    color: var(--deep-rose);
  }
  .page-jump-form {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid var(--rose);
    border-radius: 20px;
    padding: 3px 10px;
  }
  .page-jump-form input {
    width: 52px;
    border: none;
    background: transparent;
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    text-align: center;
  }
  .page-jump-form button {
    background: var(--rose);
    border: none;
    color: white;
    border-radius: 50%;
    width: 22px; height: 22px;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
  }
  .page-counter {
    font-family: 'Dancing Script', cursive;
    font-size: 1rem;
    color: var(--deep-rose);
    min-width: 60px;
    text-align: right;
  }

  /* Book stage */
  .book-stage {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1500px;
    overflow: hidden;
    position: relative;
  }

  /* ===========================
     CUTE PAGE TURN — Fold from corner
     =========================== */
  .book {
    width: min(340px, 95vw);
    height: min(520px, calc(100vh - 130px));
    position: relative;
    transform-style: preserve-3d;
  }

  /* Shadow under book */
  .book::after {
    content: '';
    position: absolute;
    bottom: -16px; left: 5%; right: 5%;
    height: 18px;
    background: radial-gradient(ellipse, rgba(192,68,107,0.25) 0%, transparent 70%);
    border-radius: 50%;
  }

  .page-container {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
  }

  .page {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 4px 16px 16px 4px;
    background: var(--cream);
    backface-visibility: hidden;
    overflow: hidden;
    box-shadow:
      3px 0 12px rgba(192,68,107,0.12),
      2px 4px 20px rgba(192,68,107,0.15),
      inset -2px 0 8px rgba(0,0,0,0.04);
  }

  /* Subtle page lines */
  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 28px,
      rgba(232,121,158,0.06) 28px,
      rgba(232,121,158,0.06) 29px
    );
    pointer-events: none;
  }

  .page-inner {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 28px 22px 80px;
    scrollbar-width: thin;
    scrollbar-color: var(--soft) transparent;
    position: relative;
    z-index: 1;
  }
  .page-inner::-webkit-scrollbar { width: 3px; }
  .page-inner::-webkit-scrollbar-track { background: transparent; }
  .page-inner::-webkit-scrollbar-thumb { background: var(--soft); border-radius: 3px; }

  /* ===========================
     CUTE PAGE TURN ANIMATION
     Fold from right edge — like real book
     =========================== */

  /* Wrapper for the flip effect */
  .flip-wrapper {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
  }

  /* The curl shadow that appears while flipping */
  @keyframes cuteFlipForward {
    0% {
      transform: perspective(1200px) rotateY(0deg);
      box-shadow: 3px 0 12px rgba(192,68,107,0.12);
    }
    15% {
      transform: perspective(1200px) rotateY(-15deg);
      box-shadow: 15px 0 30px rgba(192,68,107,0.25);
    }
    50% {
      transform: perspective(1200px) rotateY(-90deg);
      box-shadow: -20px 0 40px rgba(192,68,107,0.35);
    }
    85% {
      transform: perspective(1200px) rotateY(-165deg);
      box-shadow: -10px 0 20px rgba(192,68,107,0.15);
    }
    100% {
      transform: perspective(1200px) rotateY(-180deg);
      box-shadow: none;
    }
  }

  @keyframes cuteFlipBack {
    0% {
      transform: perspective(1200px) rotateY(0deg);
    }
    50% {
      transform: perspective(1200px) rotateY(90deg);
      box-shadow: 20px 0 40px rgba(192,68,107,0.35);
    }
    100% {
      transform: perspective(1200px) rotateY(180deg);
    }
  }

  /* Page curl animation on the container */
  .book.flipping-forward .page-container {
    animation: cuteFlipForward 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    transform-origin: left center;
  }
  .book.flipping-back .page-container {
    animation: cuteFlipBack 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    transform-origin: left center;
  }

  /* Page corner fold */
  .page::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 0 22px 22px;
    border-color: transparent transparent rgba(232,121,158,0.25) transparent;
    transition: border-width 0.2s;
  }
  .page:hover::after {
    border-width: 0 0 30px 30px;
  }

  /* Floating glitter sparkles on page turn */
  .page-sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 0.8rem;
    z-index: 100;
    animation: pageSparkleAnim 0.6s forwards;
  }
  @keyframes pageSparkleAnim {
    0% { transform: scale(0) translateY(0); opacity: 1; }
    100% { transform: scale(1.2) translateY(-20px); opacity: 0; }
  }

  /* Page decorations */
  .page-deco-top {
    position: absolute;
    top: 10px; left: 0; right: 0;
    text-align: center;
    font-size: 0.8rem;
    color: var(--rose);
    opacity: 0.4;
    letter-spacing: 4px;
  }
  .page-deco-bottom {
    position: absolute;
    bottom: 14px; left: 0; right: 0;
    text-align: center;
    font-size: 0.75rem;
    color: var(--rose);
    opacity: 0.35;
  }
  .page-num-display {
    position: absolute;
    bottom: 14px;
    font-family: 'Dancing Script', cursive;
    font-size: 0.9rem;
    color: var(--rose);
    opacity: 0.55;
  }
  .page-num-display.left { left: 18px; }
  .page-num-display.right { right: 18px; }

  /* Content styles */
  .page-heading {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem, 5vw, 1.7rem);
    color: var(--deep-rose);
    text-align: center;
    margin-bottom: 16px;
    line-height: 1.3;
  }
  .page-text {
    font-family: 'Lora', serif;
    font-size: clamp(0.82rem, 3.2vw, 0.95rem);
    color: var(--text);
    line-height: 1.85;
    text-align: justify;
    margin-bottom: 14px;
  }
  .page-text.italic { font-style: italic; }
  .poem-block {
    background: linear-gradient(135deg, rgba(249,200,217,0.3), rgba(232,121,158,0.1));
    border-left: 3px solid var(--rose);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    margin: 14px 0;
  }
  .poem-block p {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: clamp(0.8rem, 3vw, 0.9rem);
    color: var(--deep-rose);
    line-height: 2;
    margin: 0;
  }
  .divider {
    text-align: center;
    margin: 16px 0;
    color: var(--rose);
    font-size: 1.1rem;
    opacity: 0.6;
    letter-spacing: 6px;
  }
  .highlight {
    background: linear-gradient(120deg, rgba(249,200,217,0.5) 0%, rgba(249,200,217,0.5) 100%);
    border-radius: 4px;
    padding: 0 3px;
    font-weight: 600;
  }
  .body-feature-heading {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.2rem, 4.5vw, 1.5rem);
    color: var(--deep-rose);
    text-align: center;
    margin: 12px 0 10px;
  }
  .body-feature-icon {
    text-align: center;
    font-size: 1.8rem;
    margin: 8px 0;
  }

  /* Nav buttons */
  .nav-bar {
    width: 100%;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(232,121,158,0.2);
    flex-shrink: 0;
  }
  .nav-btn {
    background: linear-gradient(135deg, var(--rose), var(--deep-rose));
    border: none;
    color: white;
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Dancing Script', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(192,68,107,0.3);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
    user-select: none;
  }
  .nav-btn:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(192,68,107,0.2); }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }

  /* Progress */
  .progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: linear-gradient(to right, var(--rose), var(--deep-rose));
    transition: width 0.4s ease;
    border-radius: 0 2px 2px 0;
  }

  /* Swipe hint */
  .swipe-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Dancing Script', cursive;
    color: var(--deep-rose);
    font-size: 0.9rem;
    animation: fadeInOut 3s 2s forwards;
    pointer-events: none;
    white-space: nowrap;

// ============================================================
// SEEDED RANDOM NUMBER GENERATOR
// Guarantees page 32 is always the same content every time!
// ============================================================
function splitmix32(a) {
  return function() {
    a |= 0; a = a + 0x9e3779b9 | 0;
    var t = a ^ a >>> 16; t = Math.imul(t, 0x21f0aaad);
    t = t ^ t >>> 15; t = Math.imul(t, 0x735a2d97);
    return ((t = t ^ t >>> 15) >>> 0) / 4294967296;
  }
}

function getRandomItem(arr, prng) {
  return arr[Math.floor(prng() * arr.length)];
}

// ============================================================
// PAGE GENERATION
// ============================================================
function generatePageContent(pageNum) {
  // Page 1: dedication
  if (pageNum === 1) {
    return `<div class="page-heading">💕 To My Beautiful Love</div>
            <div class="first-page-decor">💕</div>

            <div class="page-text">You deserve to feel cherished. You deserve to feel beautiful. You deserve to know, every single day, how incredibly special you are. This book is my attempt — imperfect and yet so full of love — to show you.</div>
            <div class="poem-block"><p>Read slowly, my love.<br>Let each page settle into your heart.<br>Because every word here<br>is true, and real, and meant only for you.</p></div>
            <div class="page-text italic" style="text-align:center;font-family:'Dancing Script',cursive;font-size:1.2rem;color:var(--deep-rose);">With all my love, always. 💕</div>`;
  }

  // Page 700: Finale
  if (pageNum === TOTAL_PAGES) {
    return `<div class="page-heading">💕 Forever</div>
            <div class="page-text">You are my sweetest happiness. My softest comfort. My brightest light. My most beautiful dream come true. And you will always be all of those things — always, forever, endlessly.</div>
            <div class="page-text">I love you. More than these 700 pages. More than every word in every language. More than I will ever be able to say.</div>
            <div class="divider">💕 💕 💕</div>
            <div class="page-text italic" style="text-align:center;font-family:'Dancing Script',cursive;font-size:1.3rem;color:var(--deep-rose);">The End... and the beginning of forever.</div>`;
  }

  // Create a seeded PRNG specifically for this page number
  const prng = splitmix32(pageNum * 12345);

  // Body appreciation section (pages 601-699)
  if (pageNum >= BODY_SECTION_START) {
    const feat = getRandomItem(bodyFeatures, prng);
    const bodyPraise1 = getRandomItem(bodyTexts, prng);
    
    // Ensure the second text is different from the first
    let bodyPraise2 = getRandomItem(bodyTexts, prng);
    while(bodyPraise2 === bodyPraise1) {
        bodyPraise2 = getRandomItem(bodyTexts, prng);
    }

    return `<div class="body-feature-heading">${feat.feature}</div>
            <div class="body-feature-icon">${feat.icon}</div>
            <div class="page-text">${bodyPraise1}</div>
            <div class="page-text">${bodyPraise2}</div>
            <div class="divider" style="font-size: 0.8rem;">Page ${pageNum} 💕</div>`;
  }

  // Standard procedural page generation (Pages 2-600)
  const title = getRandomItem(titles, prng);
  const decor = getRandomItem(decors, prng);
  const opener = getRandomItem(openers, prng);
  const body = getRandomItem(bodies, prng);
  const poem = getRandomItem(poems, prng);
  const closer = getRandomItem(closers, prng);

  return `
    <div class="page-heading">${title}</div>
    <div class="first-page-decor">${decor}</div>
    <div class="page-text">${opener}</div>

  `;
}

// ============================================================
// APP STATE
// ============================================================
let currentPage = 1;
let isFlipping = false;
let touchStartX = 0;
let touchStartY = 0;

// ============================================================
// OPEN BOOK
// ============================================================
function openBook() {
  const cs = document.getElementById('cover-screen');
  cs.classList.add('cover-opening');
  createSparkles(window.innerWidth / 2, window.innerHeight / 2);
  setTimeout(() => {
    cs.style.display = 'none';
    const reader = document.getElementById('reader');
    reader.classList.add('visible');
    renderPage(1);
  }, 1300);
}

// ============================================================
// RENDER PAGE
// ============================================================
function renderPage(num, direction) {
  currentPage = Math.max(1, Math.min(TOTAL_PAGES, num));
  const inner = document.getElementById('pageInner');
  const book = document.getElementById('book');
  const page = document.getElementById('currentPage');

  if (currentPage >= BODY_SECTION_START) {
    page.classList.add('body-section');
  } else {
    page.classList.remove('body-section');
  }

  if (direction) {
    book.classList.remove('flipping-forward', 'flipping-back');
    void book.offsetWidth;
    book.classList.add(direction === 'forward' ? 'flipping-forward' : 'flipping-back');

    // Spawn cute page sparkles during flip
    spawnPageSparkles();

    setTimeout(() => {
      book.classList.remove('flipping-forward', 'flipping-back');
    }, 650);
  }

  inner.innerHTML = generatePageContent(currentPage);

  const numL = document.getElementById('pageNumLeft');
  const numR = document.getElementById('pageNumRight');
  if (currentPage % 2 === 0) {
    numL.textContent = currentPage;
    numR.textContent = '';
  } else {
    numL.textContent = '';
    numR.textContent = currentPage;
  }

  document.getElementById('pageCounter').textContent = `${currentPage} / ${TOTAL_PAGES}`;
  const pct = (currentPage / TOTAL_PAGES) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= TOTAL_PAGES;
  document.getElementById('ribbon').style.height = (40 + pct * 0.3) + 'px';

  if ([100,200,300,400,500,600,700].includes(currentPage)) spawnConfetti();

  inner.scrollTop = 0;
}

function nextPage() {
  if (isFlipping || currentPage >= TOTAL_PAGES) return;
  isFlipping = true;
  renderPage(currentPage + 1, 'forward');
  setTimeout(() => { isFlipping = false; }, 700);
}

function prevPage() {
  if (isFlipping || currentPage <= 1) return;
  isFlipping = true;
  renderPage(currentPage - 1, 'back');
  setTimeout(() => { isFlipping = false; }, 700);
}

function jumpToPage() {
  const val = parseInt(document.getElementById('jumpInput').value);
  if (val >= 1 && val <= TOTAL_PAGES) {
    renderPage(val);
    document.getElementById('jumpInput').value = '';
    createSparkles(window.innerWidth / 2, window.innerHeight / 3);
  }
}

document.getElementById('jumpInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') jumpToPage();
});

// ============================================================
// PAGE SPARKLES — appear during flip
// ============================================================
function spawnPageSparkles() {
  const book = document.getElementById('book');
  const rect = book.getBoundingClientRect();
  const emojis = ['✨','💕','🌸','💗','⭐','🌷','💫'];
  for (let i = 0; i < 5; i++) {
    const s = document.createElement('div');
    s.className = 'page-sparkle';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = (rect.left + rect.width * 0.6 + Math.random() * rect.width * 0.3) + 'px';
    s.style.top = (rect.top + Math.random() * rect.height) + 'px';
    s.style.position = 'fixed';
    s.style.zIndex = '999';
    s.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

// ============================================================
// TOUCH / SWIPE
// ============================================================
const stage = document.querySelector('.book-stage');
stage.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
stage.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) nextPage();
    else prevPage();
  }
}, { passive: true });

// Click on book right side = next, left = prev
stage.addEventListener('click', (e) => {
  const book = document.getElementById('book');
  const rect = book.getBoundingClientRect();
  const relX = e.clientX - rect.left;
  if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
    createSparkles(e.clientX, e.clientY);
    if (relX > rect.width * 0.6) nextPage();
    else if (relX < rect.width * 0.4) prevPage();
  }
});

// ============================================================
// FAIRY LIGHTS SETUP
// ============================================================
function setupFairyLights() {
  const container = document.getElementById('fairyLights');
  const types = ['bulb-warm', 'bulb-pink', 'bulb-white'];
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'bulb ' + types[i % types.length];
    b.style.animationDelay = (Math.random() * 2) + 's';
    container.appendChild(b);
  }
}
setupFairyLights();

// ============================================================
// FLOATING HEARTS
// ============================================================
function createHeartsBg() {
  const container = document.getElementById('heartsBg');
  const hearts = ['💗','💕','🌸','✨','💖','🌷','💓','❀'];
  for (let i = 0; i < 20; i++) {

    h.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    h.style.animationDuration = (8 + Math.random() * 12) + 's';
    h.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(h);
  }
}
createHeartsBg();

// ============================================================
// SPARKLES
// ============================================================
function createSparkles(x, y) {
  const emojis = ['✨','💕','🌸','💗','⭐','🌷','💖'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
    s.style.top = (y + (Math.random() - 0.5) * 80) + 'px';
    s.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

// CONFETTI
// ============================================================
function spawnConfetti() {
  const emojis = ['🎉','💕','🌸','✨','💗','🎊','🌷','💖','⭐'];
  for (let i = 0; i < 20; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = '-20px';
    c.style.animationDelay = (Math.random() * 1.5) + 's';
    c.style.fontSize = (0.9 + Math.random() * 0.8) + 'rem';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// ============================================================
// KEYBOARD NAVIGATION
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});
</script>
</body>
</html>
