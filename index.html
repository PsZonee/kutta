function buildBodyPages(){
  const pages=[];
  const fc=BF.length; // 13
  const base=Math.floor(100/fc); // 7
  const rem=100-base*fc; // 9
  let gi=0;
  for(let fi=0;fi<fc;fi++){
    const feat=BF[fi];
    const tot=base+(fi<rem?1:0);
    for(let pi=0;pi<tot;pi++){
      const ab=601+gi;
      const s1=ab*2.3+fi*9.1+pi*3.7,s2=ab*4.7+fi*6.3+pi*7.1,s3=ab*7.1+fi*3.9+pi*11.3;
      const sq=ab*5.5+fi*8.7+pi*4.3,sp=ab*3.1+fi*5.5+pi*9.7,sd=ab*8.9+pi*6.1,sc=ab*6.7+fi*2.1+pi*5.9;
      let p1=pick(feat.P,s1),p2=pick(feat.P,s2),p3=pick(feat.P,s3);
      if(p2===p1)p2=pick(feat.P,s2+7.3);if(p3===p1||p3===p2)p3=pick(feat.P,s3+13.1);
      const q=pick(feat.Q,sq),pm=pick(POEMS,sp),dv=pick(DV,sd),cl=pick(CL,sc);
      const poem=`<div class="poem-block"><p>${pm[0]}<br>${pm[1]}<br>${pm[2]}<br>${pm[3]}</p></div>`;
      const tail=`<div class="divider">${dv}</div><div class="page-text centered italic" style="font-size:.85rem;color:var(--deep-rose);">${cl}</div>`;
      const hdr=`<div class="body-feature-heading">${feat.name}</div><div class="body-feature-icon">${feat.icon}</div>`;
      const lay=pi%4;
      let html='';
      if(lay===0)html=hdr+`<div class="page-text">${p1}</div><div class="page-text">${p2}</div><div class="pull-quote">${q}</div><div class="page-text">${p3}</div>`+poem+tail;
      else if(lay===1)html=hdr+poem+`<div class="page-text">${p1}</div><div class="page-text">${p3}</div><div class="pull-quote">${q}</div><div class="page-text">${p2}</div>`+tail;
      else if(lay===2)html=hdr+`<div class="page-text">${p2}</div><div class="pull-quote">${q}</div><div class="page-text">${p1}</div>`+poem+`<div class="page-text">${p3}</div>`+tail;
      else html=hdr+`<div class="page-text">${p3}</div><div class="page-text">${p2}</div>`+poem+`<div class="pull-quote">${q}</div><div class="page-text">${p1}</div>`+tail;
      pages.push(html);gi++;
    }
  }
  return pages;
}
const BODY_PAGES=buildBodyPages();

function generatePageContent(p){
  if(p===1)return`<div class="page-heading">💕 A Book Written Only For You</div><div class="first-page-decor">💕 ✨ 💕</div><div class="page-text italic">This book has seven hundred pages. Every single one of them is different. Every single one of them is for you — fully, completely, without reservation, with every honest word I know.</div><div class="page-text">I wrote this because you deserve to know, in real and honest detail, what it is like to know you and love you. You deserve to feel cherished not in a vague, generalised way, but specifically. Deeply. In the particular, beautiful, irreplaceable way that only you deserve.</div><div class="page-text">You are extraordinary. Your kindness, your warmth, your heart, your soul, your way of moving through the world — all of it is genuinely, breathtakingly beautiful. And you deserve to hear it. Again and again, for as many pages as it takes.</div><div class="poem-block"><p>Read this slowly, love.<br>Let every word settle.<br>Because everything here is true —<br>every word of all seven hundred pages —<br>and all of it is for you.</p></div><div class="page-text italic centered" style="margin-top:16px;color:var(--deep-rose);">With every word, and all my love. 💕</div>`;
  if(p>=BODY_START)return BODY_PAGES[Math.min(p-BODY_START,BODY_PAGES.length-1)];
  return genStd(p);
}

/* ── APP LOGIC ── */
let cur=1,flip=false,tx=0,ty=0;
function openBook(){const cs=document.getElementById('cover-screen');cs.classList.add('cover-opening');createSparkles(innerWidth/2,innerHeight/2);setTimeout(()=>{cs.style.display='none';document.getElementById('reader').classList.add('visible');render(1);},1300);}
function render(n,dir){
  cur=Math.max(1,Math.min(TOTAL_PAGES,n));
  const inner=document.getElementById('pageInner'),book=document.getElementById('book'),page=document.getElementById('currentPage');
  page.classList.toggle('body-section',cur>=BODY_START);
  if(dir){book.classList.remove('flipping-forward','flipping-back');void book.offsetWidth;book.classList.add(dir==='f'?'flipping-forward':'flipping-back');sparkFlip();setTimeout(()=>book.classList.remove('flipping-forward','flipping-back'),650);}
  inner.innerHTML=generatePageContent(cur);
  const L=document.getElementById('pageNumLeft'),R=document.getElementById('pageNumRight');
  if(cur%2===0){L.textContent=cur;R.textContent='';}else{L.textContent='';R.textContent=cur;}
  document.getElementById('pageCounter').textContent=cur+' / '+TOTAL_PAGES;
  const pct=(cur/TOTAL_PAGES)*100;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('prevBtn').disabled=cur<=1;document.getElementById('nextBtn').disabled=cur>=TOTAL_PAGES;
  document.getElementById('ribbon').style.height=(40+pct*.3)+'px';
  if([100,200,300,400,500,600,700].includes(cur))confetti();
  inner.scrollTop=0;
}
function nextPage(){if(flip||cur>=TOTAL_PAGES)return;flip=true;render(cur+1,'f');setTimeout(()=>flip=false,700);}
function prevPage(){if(flip||cur<=1)return;flip=true;render(cur-1,'b');setTimeout(()=>flip=false,700);}
function jumpToPage(){const v=parseInt(document.getElementById('jumpInput').value);if(v>=1&&v<=TOTAL_PAGES){render(v);document.getElementById('jumpInput').value='';createSparkles(innerWidth/2,innerHeight/3);}}
document.getElementById('jumpInput').addEventListener('keydown',e=>{if(e.key==='Enter')jumpToPage();});
function sparkFlip(){const r=document.getElementById('book').getBoundingClientRect(),e=['✨','💕','🌸','💗','⭐','🌷','💫'];for(let i=0;i<6;i++){const s=document.createElement('div');s.className='page-sparkle';s.textContent=e[Math.floor(Math.random()*e.length)];s.style.cssText=`left:${r.left+r.width*.45+Math.random()*r.width*.45}px;top:${r.top+Math.random()*r.height}px;position:fixed;z-index:999;animation-delay:${Math.random()*.3}s`;document.body.appendChild(s);setTimeout(()=>s.remove(),900);}}
const stage=document.querySelector('.book-stage');
stage.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){if(dx<0)nextPage();else prevPage();}},{passive:true});
stage.addEventListener('click',e=>{const r=document.getElementById('book').getBoundingClientRect(),rx=e.clientX-r.left;if(e.target.tagName!=='BUTTON'&&e.target.tagName!=='INPUT'){createSparkles(e.clientX,e.clientY);if(rx>r.width*.6)nextPage();else if(rx<r.width*.4)prevPage();}});
(function(){const c=document.getElementById('fairyLights'),t=['bulb-warm','bulb-pink','bulb-white'];for(let i=0;i<18;i++){const b=document.createElement('div');b.className='bulb '+t[i%t.length];b.style.animationDelay=(Math.random()*2)+'s';c.appendChild(b);}})();
(function(){const c=document.getElementById('heartsBg'),h=['💗','💕','🌸','✨','💖','🌷','💓','❀'];for(let i=0;i<20;i++){const el=document.createElement('div');el.className='heart-float';el.textContent=h[Math.floor(Math.random()*h.length)];el.style.left=Math.random()*100+'%';el.style.fontSize=(0.8+Math.random()*1.2)+'rem';el.style.animationDuration=(8+Math.random()*12)+'s';el.style.animationDelay=(Math.random()*10)+'s';c.appendChild(el);}})();
function createSparkles(x,y){const e=['✨','💕','🌸','💗','⭐','🌷','💖'];for(let i=0;i<8;i++){const s=document.createElement('div');s.className='sparkle';s.textContent=e[Math.floor(Math.random()*e.length)];s.style.left=(x+(Math.random()-.5)*80)+'px';s.style.top=(y+(Math.random()-.5)*80)+'px';s.style.animationDelay=(Math.random()*.3)+'s';document.body.appendChild(s);setTimeout(()=>s.remove(),1200);}}
function confetti(){const e=['🎉','💕','🌸','✨','💗','🎊','🌷','💖','⭐'];for(let i=0;i<20;i++){const c=document.createElement('div');c.className='confetti-piece';c.textContent=e[Math.floor(Math.random()*e.length)];c.style.left=Math.random()*100+'vw';c.style.top='-20px';c.style.animationDelay=(Math.random()*1.5)+'s';c.style.fontSize=(0.9+Math.random()*.8)+'rem';document.body.appendChild(c);setTimeout(()=>c.remove(),4000);}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')nextPage();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevPage();});
</script>
</body>
</html>
